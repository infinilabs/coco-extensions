<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice & Coin</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 20px; gap: 20px;
      align-items: center; justify-content: center;
    }
    .result-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .result {
      font-size: 72px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      min-width: 120px;
      text-align: center;
      transition: transform 0.1s;
    }
    .result.animate {
      animation: pop 0.2s ease-out;
    }
    @keyframes pop {
      0% { transform: scale(0.8); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .result-label {
      font-size: 14px;
      color: var(--muted);
    }
    .section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 340px;
    }
    .section h3 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .dice-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
    }
    button {
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.1s;
    }
    button:hover {
      background: var(--border);
    }
    button:active {
      transform: scale(0.98);
    }
    button.coin {
      font-size: 16px;
      padding: 14px 24px;
    }
    .coin-result {
      font-size: 48px;
    }
    .history {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 100%;
      min-height: 28px;
    }
    .history-item {
      font-size: 12px;
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
    }
    footer {
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <div class="result-container">
    <div class="result" id="result">🎲</div>
    <div class="result-label" id="resultLabel">Roll a die or flip a coin</div>
  </div>

  <div class="section">
    <h3>Roll Dice</h3>
    <div class="dice-grid">
      <button onclick="rollDie(4)">d4</button>
      <button onclick="rollDie(6)">d6</button>
      <button onclick="rollDie(8)">d8</button>
      <button onclick="rollDie(10)">d10</button>
      <button onclick="rollDie(12)">d12</button>
      <button onclick="rollDie(20)">d20</button>
      <button onclick="rollDie(100)">d100</button>
      <button onclick="roll2d6()">2d6</button>
    </div>
    <div class="history" id="diceHistory"></div>
  </div>

  <div class="section">
    <h3>Flip Coin</h3>
    <button class="coin" onclick="flipCoin()">🪙 Flip</button>
    <div class="history" id="coinHistory"></div>
  </div>

  <footer>Dice & Coin · Cryptographically secure randomness</footer>

  <script>
    "use strict";

    const $result = document.getElementById("result");
    const $resultLabel = document.getElementById("resultLabel");
    const $diceHistory = document.getElementById("diceHistory");
    const $coinHistory = document.getElementById("coinHistory");

    const diceHistory = [];
    const coinHistory = [];
    const MAX_HISTORY = 8;

    // Cryptographically secure random integer in [1, max]
    function secureRandom(max) {
      const limit = Math.floor(0xffffffff / max) * max;
      const buf = new Uint32Array(1);
      do {
        window.crypto.getRandomValues(buf);
      } while (buf[0] >= limit);
      return (buf[0] % max) + 1;
    }

    function animateResult() {
      $result.classList.remove("animate");
      void $result.offsetWidth; // Trigger reflow
      $result.classList.add("animate");
    }

    function rollDie(sides) {
      const value = secureRandom(sides);
      $result.textContent = value;
      $resultLabel.textContent = `d${sides} roll`;
      animateResult();
      
      diceHistory.unshift({ sides, value });
      if (diceHistory.length > MAX_HISTORY) diceHistory.pop();
      renderDiceHistory();
    }

    function roll2d6() {
      const d1 = secureRandom(6);
      const d2 = secureRandom(6);
      const total = d1 + d2;
      $result.textContent = total;
      $resultLabel.textContent = `2d6 roll (${d1} + ${d2})`;
      animateResult();
      
      diceHistory.unshift({ sides: "2d6", value: total, detail: `${d1}+${d2}` });
      if (diceHistory.length > MAX_HISTORY) diceHistory.pop();
      renderDiceHistory();
    }

    function flipCoin() {
      const isHeads = secureRandom(2) === 1;
      $result.textContent = isHeads ? "👑" : "🌙";
      $resultLabel.textContent = isHeads ? "Heads!" : "Tails!";
      animateResult();
      
      coinHistory.unshift(isHeads ? "H" : "T");
      if (coinHistory.length > MAX_HISTORY) coinHistory.pop();
      renderCoinHistory();
    }

    function renderDiceHistory() {
      $diceHistory.innerHTML = diceHistory.map(h => 
        `<span class="history-item">${h.detail || `d${h.sides}`}: ${h.value}</span>`
      ).join("");
    }

    function renderCoinHistory() {
      $coinHistory.innerHTML = coinHistory.map(h => 
        `<span class="history-item">${h === "H" ? "👑 H" : "🌙 T"}</span>`
      ).join("");
    }
  </script>
</body>
</html>
