<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorem Ipsum</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-elev: #f5f5f5;
      --text: #1a1a1a;
      --muted: #666666;
      --border: #e0e0e0;
      --accent: #6366f1;
      --accent-text: #ffffff;
      --toast-bg: #333333;
      --toast-text: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --bg-elev: #2a2a2a;
        --text: #e0e0e0;
        --muted: #999999;
        --border: #3a3a3a;
        --accent: #818cf8;
        --accent-text: #1a1a1a;
        --toast-bg: #555555;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .controls label { color: var(--muted); font-size: 13px; }
    select, input[type="number"], button {
      font: inherit;
      color: var(--text);
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
    }
    input[type="number"] { width: 80px; }
    button { cursor: pointer; }
    button.primary {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
      font-weight: 600;
    }
    button:hover { filter: brightness(1.1); }
    textarea {
      flex: 1;
      width: 100%;
      min-height: 200px;
      resize: none;
      font: inherit;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--toast-bg);
      color: var(--toast-text);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    footer { color: var(--muted); font-size: 11px; text-align: center; }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <div class="controls">
    <label for="kind">Generate</label>
    <input type="number" id="count" value="3" min="1" max="100" />
    <select id="kind">
      <option value="paragraphs">paragraphs</option>
      <option value="sentences">sentences</option>
      <option value="words">words</option>
    </select>
    <button id="regen">Regenerate</button>
    <button class="primary" id="copy">Copy</button>
  </div>
  <textarea id="output" readonly aria-label="Generated text"></textarea>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    "use strict";

    // Classical Lorem Ipsum word list (the standard ~150 unique words used by
    // virtually every Lorem Ipsum generator, including the npm `lorem-ipsum`
    // package the upstream Raycast extension uses).
    const WORDS = (
      "lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod " +
      "tempor incididunt ut labore et dolore magna aliqua enim ad minim veniam " +
      "quis nostrud exercitation ullamco laboris nisi aliquip ex ea commodo " +
      "consequat duis aute irure in reprehenderit voluptate velit esse cillum " +
      "fugiat nulla pariatur excepteur sint occaecat cupidatat non proident " +
      "sunt culpa qui officia deserunt mollit anim id est laborum at vero eos " +
      "accusamus iusto odio dignissimos ducimus blanditiis praesentium " +
      "voluptatum deleniti atque corrupti quos dolores quas molestias " +
      "excepturi occaecati cupiditate similique provident voluptas nemo " +
      "omnis iste natus error sit voluptatem accusantium doloremque " +
      "laudantium totam rem aperiam eaque ipsa quae ab illo inventore " +
      "veritatis quasi architecto beatae vitae dicta explicabo nesciunt " +
      "neque porro quisquam dolor adipisci numquam eius modi tempora " +
      "incidunt magnam quaerat etiam minima nostrum exercitationem ullam " +
      "corporis suscipit laboriosam aliquid ex commodi consequatur autem " +
      "vel eum reprehenderit quo voluptate quam nihil molestiae illum fugit"
    ).split(/\s+/);

    // Bounded random integer using crypto when available, else Math.random.
    function randInt(maxExclusive) {
      if (window.crypto && window.crypto.getRandomValues) {
        const buf = new Uint32Array(1);
        window.crypto.getRandomValues(buf);
        return buf[0] % maxExclusive;
      }
      return Math.floor(Math.random() * maxExclusive);
    }
    function randBetween(lo, hi) { return lo + randInt(hi - lo + 1); }
    function pickWord() { return WORDS[randInt(WORDS.length)]; }

    function generateSentence() {
      const len = randBetween(5, 12);
      const words = [];
      for (let i = 0; i < len; i++) words.push(pickWord());
      const s = words.join(" ");
      return s.charAt(0).toUpperCase() + s.slice(1) + ".";
    }
    function generateParagraph() {
      const n = randBetween(3, 6);
      const out = [];
      for (let i = 0; i < n; i++) out.push(generateSentence());
      return out.join(" ");
    }
    function generate(kind, count) {
      count = Math.max(1, Math.min(100, count | 0));
      if (kind === "words") {
        const out = [];
        for (let i = 0; i < count; i++) out.push(pickWord());
        const s = out.join(" ");
        return s.charAt(0).toUpperCase() + s.slice(1);
      }
      if (kind === "sentences") {
        const out = [];
        for (let i = 0; i < count; i++) out.push(generateSentence());
        return out.join(" ");
      }
      // paragraphs
      const out = [];
      for (let i = 0; i < count; i++) out.push(generateParagraph());
      return out.join("\n\n");
    }

    const $count = document.getElementById("count");
    const $kind  = document.getElementById("kind");
    const $out   = document.getElementById("output");
    const $toast = document.getElementById("toast");

    function showToast(msg) {
      $toast.textContent = msg;
      $toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => $toast.classList.remove("show"), 1200);
    }

    function regenerate() {
      const count = parseInt($count.value, 10) || 1;
      $out.value = generate($kind.value, count);
    }

    async function copyOutput() {
      try {
        await navigator.clipboard.writeText($out.value);
        showToast("Copied to clipboard");
      } catch (e) {
        // Fallback for environments without async clipboard API.
        $out.select();
        document.execCommand("copy");
        showToast("Copied to clipboard");
      }
    }

    document.getElementById("regen").addEventListener("click", regenerate);
    document.getElementById("copy").addEventListener("click", copyOutput);
    $count.addEventListener("change", regenerate);
    $kind.addEventListener("change", regenerate);

    regenerate();
  </script>
</body>
</html>
