<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-elev: #f5f5f5;
      --text: #1a1a1a;
      --muted: #666666;
      --border: #e0e0e0;
      --accent: #6366f1;
      --accent-text: #ffffff;
      --toast-bg: #333333;
      --toast-text: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --bg-elev: #2a2a2a;
        --text: #e0e0e0;
        --muted: #999999;
        --border: #3a3a3a;
        --accent: #818cf8;
        --accent-text: #1a1a1a;
        --toast-bg: #555555;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 14px;
    }
    .password-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    #password {
      flex: 1;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 18px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      word-break: break-all;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    button {
      font: inherit;
      color: var(--text);
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
      font-weight: 600;
    }
    button:hover { filter: brightness(1.1); }
    .controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px 12px;
      align-items: center;
    }
    .controls label { color: var(--muted); font-size: 13px; }
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .options label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
      font-size: 13px;
      user-select: none;
    }
    input[type="range"] { width: 100%; }
    .strength {
      display: flex;
      gap: 4px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }
    .strength .bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .strength .bar > span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--accent);
      transition: width 0.15s;
    }
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--toast-bg);
      color: var(--toast-text);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    footer { color: var(--muted); font-size: 11px; text-align: center; margin-top: auto; }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <div class="password-row">
    <div id="password" aria-live="polite">…</div>
    <button id="regen" title="Regenerate">↻</button>
    <button class="primary" id="copy">Copy</button>
  </div>

  <div class="strength">
    <span>Strength</span>
    <div class="bar"><span id="strengthBar"></span></div>
    <span id="strengthLabel">—</span>
  </div>

  <div class="controls">
    <label for="length">Length</label>
    <input type="range" id="length" min="5" max="64" value="20" />
    <span id="lengthValue" style="font-variant-numeric: tabular-nums;">20</span>
  </div>

  <div class="options">
    <label><input type="checkbox" id="optUpper" checked /> Uppercase (A–Z)</label>
    <label><input type="checkbox" id="optLower" checked /> Lowercase (a–z)</label>
    <label><input type="checkbox" id="optDigit" checked /> Digits (0–9)</label>
    <label><input type="checkbox" id="optSym"   checked /> Symbols (!@#…)</label>
  </div>

  <footer>
    Ported from the Raycast <a href="https://github.com/raycast/extensions/tree/004a0b6b7c846ef7d350217d2c91bc5d34fb265d/extensions/password-generator" target="_blank" rel="noopener">Password Generator</a> extension by joshuaiz · MIT
  </footer>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    "use strict";

    const SETS = {
      upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
      lower: "abcdefghijklmnopqrstuvwxyz",
      digit: "0123456789",
      sym:   "!@#$%^&*()-_=+[]{};:,.<>/?~"
    };

    // Cryptographically-secure unbiased index into [0, max).
    function randIndex(max) {
      const limit = Math.floor(0xffffffff / max) * max;
      const buf = new Uint32Array(1);
      do {
        window.crypto.getRandomValues(buf);
      } while (buf[0] >= limit);
      return buf[0] % max;
    }

    function pickFrom(set) { return set[randIndex(set.length)]; }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = randIndex(i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function generate(length, opts) {
      const enabled = Object.entries(opts).filter(([, v]) => v).map(([k]) => k);
      if (enabled.length === 0) return "";
      // Guarantee at least one character from each enabled class, then fill
      // the rest from the union of enabled sets, then shuffle.
      const chars = [];
      for (const k of enabled) chars.push(pickFrom(SETS[k]));
      const pool = enabled.map(k => SETS[k]).join("");
      while (chars.length < length) chars.push(pickFrom(pool));
      return shuffle(chars).join("");
    }

    // Rough strength estimate: log2(pool^length) in bits, mapped to 4 buckets.
    function strengthOf(pwd, opts) {
      if (!pwd) return { ratio: 0, label: "—" };
      const pool =
        (opts.upper ? 26 : 0) +
        (opts.lower ? 26 : 0) +
        (opts.digit ? 10 : 0) +
        (opts.sym   ? SETS.sym.length : 0);
      const bits = pwd.length * Math.log2(pool || 1);
      let label = "Weak", ratio = 0.25;
      if (bits >= 128) { label = "Excellent"; ratio = 1.0; }
      else if (bits >= 80) { label = "Strong"; ratio = 0.75; }
      else if (bits >= 50) { label = "Fair";   ratio = 0.5;  }
      return { ratio, label, bits: Math.round(bits) };
    }

    const $pwd    = document.getElementById("password");
    const $len    = document.getElementById("length");
    const $lenVal = document.getElementById("lengthValue");
    const $bar    = document.getElementById("strengthBar");
    const $lbl    = document.getElementById("strengthLabel");
    const $toast  = document.getElementById("toast");
    const $opts = {
      upper: document.getElementById("optUpper"),
      lower: document.getElementById("optLower"),
      digit: document.getElementById("optDigit"),
      sym:   document.getElementById("optSym"),
    };

    function currentOpts() {
      return {
        upper: $opts.upper.checked,
        lower: $opts.lower.checked,
        digit: $opts.digit.checked,
        sym:   $opts.sym.checked,
      };
    }

    function regenerate() {
      const length = parseInt($len.value, 10);
      $lenVal.textContent = length;
      const opts = currentOpts();
      const pwd = generate(length, opts);
      $pwd.textContent = pwd || "Enable at least one character set";
      const s = strengthOf(pwd, opts);
      $bar.style.width = (s.ratio * 100) + "%";
      $lbl.textContent = pwd ? `${s.label} (${s.bits} bits)` : "—";
    }

    function showToast(msg) {
      $toast.textContent = msg;
      $toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => $toast.classList.remove("show"), 1200);
    }

    async function copyPwd() {
      const pwd = $pwd.textContent;
      if (!pwd || pwd.startsWith("Enable")) return;
      try { await navigator.clipboard.writeText(pwd); }
      catch (_) {
        const ta = document.createElement("textarea");
        ta.value = pwd; document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); ta.remove();
      }
      showToast("Password copied");
    }

    document.getElementById("regen").addEventListener("click", regenerate);
    document.getElementById("copy").addEventListener("click", copyPwd);
    $len.addEventListener("input", regenerate);
    Object.values($opts).forEach(el => el.addEventListener("change", regenerate));

    regenerate();
  </script>
</body>
</html>
