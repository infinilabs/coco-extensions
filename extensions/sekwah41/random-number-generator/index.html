<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Number Generator</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --toast-bg: #333; --toast-text: #fff;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a; --toast-bg: #555; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 16px; gap: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    label { color: var(--muted); font-size: 12px; }
    input[type="number"], select {
      font: inherit; color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px;
      width: 100%;
    }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .checkbox { display: inline-flex; gap: 6px; align-items: center; user-select: none; font-size: 13px; }
    button {
      font: inherit; color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px; padding: 7px 14px; cursor: pointer;
    }
    button.primary {
      background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600;
    }
    button:hover { filter: brightness(1.1); }
    textarea {
      flex: 1; width: 100%; min-height: 180px; resize: none;
      font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      line-height: 1.55; color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    }
    .toast {
      position: fixed; bottom: 16px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--toast-bg); color: var(--toast-text);
      padding: 8px 14px; border-radius: 6px; font-size: 13px;
      opacity: 0; pointer-events: none; transition: opacity 0.15s, transform 0.15s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    footer { color: var(--muted); font-size: 11px; text-align: center; }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <div class="grid">
    <div class="field">
      <label for="minVal">Minimum</label>
      <input type="number" id="minVal" value="1" />
    </div>
    <div class="field">
      <label for="maxVal">Maximum</label>
      <input type="number" id="maxVal" value="100" />
    </div>
    <div class="field">
      <label for="count">Count</label>
      <input type="number" id="count" value="1" min="1" max="1000" />
    </div>
    <div class="field">
      <label for="decimals">Decimal places</label>
      <input type="number" id="decimals" value="2" min="0" max="10" />
    </div>
  </div>

  <div class="row">
    <label class="checkbox"><input type="checkbox" id="floatMode" /> Decimal (float)</label>
    <label class="checkbox"><input type="checkbox" id="unique" /> Unique values</label>
    <label class="checkbox" style="margin-left:auto;">
      Separator&nbsp;
      <select id="separator">
        <option value="\n">New line</option>
        <option value=", ">Comma</option>
        <option value=" ">Space</option>
      </select>
    </label>
  </div>

  <div class="row">
    <button id="regen">Regenerate</button>
    <button class="primary" id="copy">Copy</button>
  </div>

  <textarea id="output" readonly aria-label="Generated numbers"></textarea>


  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    "use strict";

    // Cryptographically unbiased random integer in [lo, hi] inclusive.
    function randInt(lo, hi) {
      const range = hi - lo + 1;
      const limit = Math.floor(0xffffffff / range) * range;
      const buf = new Uint32Array(1);
      do { window.crypto.getRandomValues(buf); } while (buf[0] >= limit);
      return lo + (buf[0] % range);
    }

    // Unbiased random float in [lo, hi] with given decimal places.
    function randFloat(lo, hi, dp) {
      const scale = Math.pow(10, dp);
      const iLo = Math.round(lo * scale);
      const iHi = Math.round(hi * scale);
      return (randInt(iLo, iHi) / scale).toFixed(dp);
    }

    function parseNum(id) { return parseFloat(document.getElementById(id).value) || 0; }

    function generate() {
      const lo = parseNum("minVal");
      const hi = parseNum("maxVal");
      const count = Math.max(1, Math.min(1000, parseInt(document.getElementById("count").value, 10) || 1));
      const isFloat = document.getElementById("floatMode").checked;
      const wantUnique = document.getElementById("unique").checked;
      const dp = Math.max(0, Math.min(10, parseInt(document.getElementById("decimals").value, 10) || 0));
      const sep = document.getElementById("separator").value;

      if (lo >= hi) { document.getElementById("output").value = "Minimum must be less than Maximum"; return; }

      const results = [];
      const seen = new Set();
      let attempts = 0;
      const maxAttempts = count * 100;

      while (results.length < count && attempts < maxAttempts) {
        attempts++;
        const val = isFloat ? randFloat(lo, hi, dp) : String(randInt(Math.ceil(lo), Math.floor(hi)));
        if (wantUnique) {
          if (!seen.has(val)) { seen.add(val); results.push(val); }
        } else {
          results.push(val);
        }
      }

      document.getElementById("output").value = results.join(sep);
    }

    function showToast(msg) {
      const $t = document.getElementById("toast");
      $t.textContent = msg;
      $t.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => $t.classList.remove("show"), 1200);
    }

    async function copyOutput() {
      const val = document.getElementById("output").value;
      if (!val) return;
      try { await navigator.clipboard.writeText(val); }
      catch (_) { document.getElementById("output").select(); document.execCommand("copy"); }
      showToast("Copied to clipboard");
    }

    document.getElementById("regen").addEventListener("click", generate);
    document.getElementById("copy").addEventListener("click", copyOutput);

    // Disable/enable decimals field based on float mode
    document.getElementById("floatMode").addEventListener("change", function () {
      document.getElementById("decimals").disabled = !this.checked;
    });
    document.getElementById("decimals").disabled = true;

    generate();
  </script>
</body>
</html>
