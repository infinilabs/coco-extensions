<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Epoch Converter</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --success: #22c55e;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a;
              --success: #4ade80; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 20px; gap: 16px;
    }
    h1 { font-size: 18px; font-weight: 600; margin: 0; }
    .now-bar {
      display: flex; gap: 12px; align-items: center;
      background: var(--bg-elev); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px;
    }
    .now-label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .now-value {
      font: 14px "SF Mono", Monaco, Consolas, monospace;
      color: var(--accent); flex: 1;
    }
    .section {
      background: var(--bg-elev); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px;
    }
    .section-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    input {
      font: 14px "SF Mono", Monaco, Consolas, monospace;
      padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg);
      color: var(--text); width: 100%;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .result {
      font: 13px "SF Mono", Monaco, Consolas, monospace;
      padding: 10px 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px;
      min-height: 38px; display: flex; align-items: center;
      cursor: pointer;
    }
    .result:hover { border-color: var(--accent); }
    .result.empty { color: var(--muted); font-style: italic; }
    .options { display: flex; gap: 8px; margin-bottom: 12px; }
    .option {
      font: inherit; font-size: 11px;
      padding: 4px 10px; border-radius: 4px;
      background: var(--bg); color: var(--muted);
      border: 1px solid var(--border); cursor: pointer;
    }
    .option:hover { color: var(--text); }
    .option.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .status { font-size: 10px; color: var(--success); margin-left: 8px; }
    footer {
      color: var(--muted); font-size: 11px;
      text-align: center; padding-top: 8px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <h1>🕐 Epoch Converter</h1>
  
  <div class="now-bar">
    <div>
      <div class="now-label">Current Time</div>
      <div class="now-value" id="nowValue">-</div>
    </div>
    <button class="option" onclick="useNow()">Use Now</button>
  </div>

  <div class="section">
    <div class="section-title">Timestamp → Date</div>
    <div class="options">
      <button class="option active" data-unit="s" onclick="setUnit('s')">Seconds</button>
      <button class="option" data-unit="ms" onclick="setUnit('ms')">Milliseconds</button>
    </div>
    <div class="field">
      <label>Unix Timestamp</label>
      <input type="text" id="tsInput" placeholder="e.g. 1700000000" oninput="convertTs()">
    </div>
    <div class="field">
      <label>Result (click to copy)</label>
      <div class="result empty" id="tsResult" onclick="copy('tsResult')">Enter a timestamp</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Date → Timestamp</div>
    <div class="field">
      <label>Date/Time (local)</label>
      <input type="datetime-local" id="dateInput" oninput="convertDate()">
    </div>
    <div class="field">
      <label>Result (click to copy)</label>
      <div class="result empty" id="dateResult" onclick="copy('dateResult')">Select a date</div>
    </div>
  </div>

  <footer>Epoch Converter · All processing local</footer>

  <script>
    "use strict";

    let unit = "s";
    const $tsInput = document.getElementById("tsInput");
    const $tsResult = document.getElementById("tsResult");
    const $dateInput = document.getElementById("dateInput");
    const $dateResult = document.getElementById("dateResult");
    const $nowValue = document.getElementById("nowValue");

    function setUnit(u) {
      unit = u;
      document.querySelectorAll(".options .option").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.unit === u);
      });
      convertTs();
    }

    function convertTs() {
      const val = $tsInput.value.trim();
      if (!val) {
        $tsResult.textContent = "Enter a timestamp";
        $tsResult.classList.add("empty");
        return;
      }
      
      const num = parseInt(val, 10);
      if (isNaN(num)) {
        $tsResult.textContent = "Invalid number";
        $tsResult.classList.add("empty");
        return;
      }

      const ms = unit === "s" ? num * 1000 : num;
      const date = new Date(ms);
      
      if (isNaN(date.getTime())) {
        $tsResult.textContent = "Invalid date";
        $tsResult.classList.add("empty");
        return;
      }

      $tsResult.textContent = date.toLocaleString() + " (local)";
      $tsResult.classList.remove("empty");
    }

    function convertDate() {
      const val = $dateInput.value;
      if (!val) {
        $dateResult.textContent = "Select a date";
        $dateResult.classList.add("empty");
        return;
      }

      const date = new Date(val);
      const ts = Math.floor(date.getTime() / 1000);
      const tsMs = date.getTime();

      $dateResult.textContent = `${ts} (s) / ${tsMs} (ms)`;
      $dateResult.classList.remove("empty");
    }

    function useNow() {
      const now = Math.floor(Date.now() / 1000);
      $tsInput.value = now;
      convertTs();
    }

    async function copy(id) {
      const el = document.getElementById(id);
      if (el.classList.contains("empty")) return;
      
      let text = el.textContent;
      // Extract just the number for dateResult
      if (id === "dateResult") {
        text = text.split(" ")[0];
      }
      
      try {
        await navigator.clipboard.writeText(text);
        showCopied(el);
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showCopied(el);
      }
    }

    function showCopied(el) {
      const status = document.createElement("span");
      status.className = "status";
      status.textContent = "Copied!";
      el.appendChild(status);
      setTimeout(() => status.remove(), 1500);
    }

    function updateNow() {
      const now = Math.floor(Date.now() / 1000);
      $nowValue.textContent = now;
    }

    // Set default date input to now
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    $dateInput.value = now.toISOString().slice(0, 16);
    convertDate();

    updateNow();
    setInterval(updateNow, 1000);
    $tsInput.focus();
  </script>
</body>
</html>
