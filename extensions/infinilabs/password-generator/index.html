<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --success: #22c55e;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a;
              --success: #4ade80; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 20px; gap: 16px;
    }
    h1 { font-size: 18px; font-weight: 600; margin: 0; display: flex; align-items: center; gap: 8px; }
    .password-display {
      display: flex; gap: 8px; align-items: stretch;
    }
    .password-box {
      flex: 1;
      font-family: "SF Mono", Monaco, Consolas, monospace;
      font-size: 16px;
      padding: 14px 16px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      word-break: break-all;
      user-select: all;
      min-height: 52px;
      display: flex;
      align-items: center;
    }
    button {
      font: inherit; font-size: 13px; font-weight: 500;
      color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 16px; cursor: pointer; transition: all 0.15s;
    }
    button:hover { background: var(--border); }
    button:active { transform: scale(0.98); }
    button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    button.primary:hover { opacity: 0.9; }
    button.copied { background: var(--success); border-color: var(--success); color: white; }
    .actions { display: flex; gap: 8px; }
    .section { display: flex; flex-direction: column; gap: 8px; }
    .section-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    .length-control { display: flex; align-items: center; gap: 12px; }
    .length-control input[type="range"] {
      flex: 1; height: 6px; -webkit-appearance: none; appearance: none;
      background: var(--border); border-radius: 3px; outline: none;
    }
    .length-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent);
      border-radius: 50%; cursor: pointer;
    }
    .length-value {
      font-family: "SF Mono", Monaco, Consolas, monospace;
      font-size: 14px; font-weight: 600;
      min-width: 36px; text-align: center;
    }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
    }
    .option:hover { border-color: var(--accent); }
    .option input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: var(--accent);
    }
    .option-text { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .option-label { font-size: 14px; font-weight: 500; }
    .option-chars { font-family: "SF Mono", Monaco, Consolas, monospace; font-size: 11px; color: var(--muted); }
    .strength {
      display: flex; gap: 4px; height: 4px;
    }
    .strength-bar {
      flex: 1; background: var(--border); border-radius: 2px; transition: background 0.2s;
    }
    .strength-bar.active.weak { background: #ef4444; }
    .strength-bar.active.medium { background: #f59e0b; }
    .strength-bar.active.strong { background: #22c55e; }
    .strength-bar.active.very-strong { background: #10b981; }
    footer {
      color: var(--muted); font-size: 11px;
      text-align: center; padding-top: 8px; margin-top: auto;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="password-display">
    <div class="password-box" id="password">Click Generate</div>
  </div>
  
  <div class="strength" id="strength">
    <div class="strength-bar"></div>
    <div class="strength-bar"></div>
    <div class="strength-bar"></div>
    <div class="strength-bar"></div>
  </div>
  
  <div class="actions">
    <button class="primary" onclick="generate()" style="flex:1">🔄 Generate</button>
    <button onclick="copyPassword()" id="copyBtn">📋 Copy</button>
  </div>

  <div class="section">
    <span class="section-label">Length</span>
    <div class="length-control">
      <input type="range" id="length" min="4" max="64" value="16" oninput="updateLength()">
      <span class="length-value" id="lengthValue">16</span>
    </div>
  </div>

  <div class="section">
    <span class="section-label">Characters</span>
    <div class="options">
      <label class="option">
        <input type="checkbox" id="uppercase" checked onchange="generate()">
        <div class="option-text">
          <span class="option-label">Uppercase</span>
          <span class="option-chars">ABCDEFGHIJKLMNOPQRSTUVWXYZ</span>
        </div>
      </label>
      <label class="option">
        <input type="checkbox" id="lowercase" checked onchange="generate()">
        <div class="option-text">
          <span class="option-label">Lowercase</span>
          <span class="option-chars">abcdefghijklmnopqrstuvwxyz</span>
        </div>
      </label>
      <label class="option">
        <input type="checkbox" id="numbers" checked onchange="generate()">
        <div class="option-text">
          <span class="option-label">Numbers</span>
          <span class="option-chars">0123456789</span>
        </div>
      </label>
      <label class="option">
        <input type="checkbox" id="symbols" checked onchange="generate()">
        <div class="option-text">
          <span class="option-label">Symbols</span>
          <span class="option-chars">!@#$%^&*()_+-=[]{}|;:,.<>?</span>
        </div>
      </label>
    </div>
  </div>



  <script>
    "use strict";

    const CHARS = {
      uppercase: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
      lowercase: "abcdefghijklmnopqrstuvwxyz",
      numbers: "0123456789",
      symbols: "!@#$%^&*()_+-=[]{}|;:,.<>?"
    };

    const $password = document.getElementById("password");
    const $length = document.getElementById("length");
    const $lengthValue = document.getElementById("lengthValue");
    const $copyBtn = document.getElementById("copyBtn");
    const $strength = document.getElementById("strength");

    function getCharset() {
      let chars = "";
      for (const [key, value] of Object.entries(CHARS)) {
        if (document.getElementById(key).checked) {
          chars += value;
        }
      }
      return chars;
    }

    function generate() {
      const charset = getCharset();
      if (!charset) {
        $password.textContent = "Select at least one option";
        updateStrength(0);
        return;
      }
      
      const length = parseInt($length.value, 10);
      const array = new Uint32Array(length);
      crypto.getRandomValues(array);
      
      let password = "";
      for (let i = 0; i < length; i++) {
        password += charset[array[i] % charset.length];
      }
      
      $password.textContent = password;
      updateStrength(calcStrength(password, charset.length));
    }

    function calcStrength(password, charsetSize) {
      const entropy = password.length * Math.log2(charsetSize);
      if (entropy < 28) return 1;
      if (entropy < 36) return 2;
      if (entropy < 60) return 3;
      return 4;
    }

    function updateStrength(level) {
      const bars = $strength.querySelectorAll(".strength-bar");
      const classes = ["weak", "medium", "strong", "very-strong"];
      bars.forEach((bar, i) => {
        bar.classList.remove("active", ...classes);
        if (i < level) {
          bar.classList.add("active", classes[level - 1]);
        }
      });
    }

    function updateLength() {
      $lengthValue.textContent = $length.value;
      generate();
    }

    async function copyPassword() {
      const text = $password.textContent;
      if (!text || text.startsWith("Select") || text.startsWith("Click")) return;
      
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
      
      $copyBtn.textContent = "✓ Copied";
      $copyBtn.classList.add("copied");
      setTimeout(() => {
        $copyBtn.textContent = "📋 Copy";
        $copyBtn.classList.remove("copied");
      }, 1500);
    }

    generate();
  </script>
</body>
</html>
