<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binary Text Converter</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --success: #22c55e;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a;
              --success: #4ade80; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 16px; gap: 12px;
    }
    h1 { font-size: 16px; font-weight: 600; margin: 0; }
    .panel {
      display: flex; flex-direction: column; gap: 6px; flex: 1;
    }
    .panel-header {
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    textarea {
      flex: 1; font: 13px "SF Mono", Monaco, Consolas, monospace;
      padding: 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-elev);
      color: var(--text); resize: none;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .options {
      display: flex; gap: 12px; align-items: center;
    }
    label {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; cursor: pointer;
    }
    select {
      font: inherit; font-size: 12px;
      padding: 6px 10px; border: 1px solid var(--border);
      border-radius: 4px; background: var(--bg-elev);
      color: var(--text);
    }
    .swap-btn {
      font: inherit; font-size: 16px;
      width: 36px; height: 36px;
      background: var(--bg-elev); color: var(--text);
      border: 1px solid var(--border); border-radius: 50%;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; margin: 0 auto;
    }
    .swap-btn:hover { border-color: var(--accent); }
    .actions { display: flex; gap: 8px; }
    button {
      font: inherit; font-size: 12px; font-weight: 500;
      color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 16px; cursor: pointer;
    }
    button:hover { background: var(--border); }
    button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .status { font-size: 11px; color: var(--success); }
    footer { color: var(--muted); font-size: 11px; text-align: center; padding-top: 8px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <h1>💾 Binary Text Converter</h1>

  <div class="options">
    <label>
      Separator:
      <select id="separator">
        <option value=" ">Space</option>
        <option value="">None</option>
        <option value="-">Dash</option>
        <option value="\n">Newline</option>
      </select>
    </label>
    <label>
      Encoding:
      <select id="encoding">
        <option value="binary">Binary (0/1)</option>
        <option value="octal">Octal</option>
        <option value="decimal">Decimal</option>
        <option value="hex">Hexadecimal</option>
      </select>
    </label>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-label">Text</span>
    </div>
    <textarea id="textInput" placeholder="Enter text here..."></textarea>
  </div>

  <button class="swap-btn" onclick="swap()" title="Swap">⇅</button>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-label" id="outputLabel">Binary</span>
    </div>
    <textarea id="binaryOutput" placeholder="Binary representation will appear here..."></textarea>
  </div>

  <div class="actions">
    <button class="primary" onclick="copyOutput()">Copy Output</button>
    <button onclick="clearAll()">Clear</button>
    <span class="status" id="status"></span>
  </div>



  <script>
    "use strict";

    const $textInput = document.getElementById("textInput");
    const $binaryOutput = document.getElementById("binaryOutput");
    const $separator = document.getElementById("separator");
    const $encoding = document.getElementById("encoding");
    const $outputLabel = document.getElementById("outputLabel");
    const $status = document.getElementById("status");

    let direction = "encode"; // encode or decode

    function textToCode(text) {
      const encoding = $encoding.value;
      const sep = $separator.value === '\\n' ? '\n' : $separator.value;
      
      return text.split('').map(char => {
        const code = char.charCodeAt(0);
        switch (encoding) {
          case 'binary': return code.toString(2).padStart(8, '0');
          case 'octal': return code.toString(8).padStart(3, '0');
          case 'decimal': return code.toString(10);
          case 'hex': return code.toString(16).padStart(2, '0').toUpperCase();
          default: return code.toString(2).padStart(8, '0');
        }
      }).join(sep);
    }

    function codeToText(code) {
      const encoding = $encoding.value;
      let sep = $separator.value === '\\n' ? '\n' : $separator.value;
      
      // Clean input
      code = code.trim();
      if (!code) return '';
      
      let parts;
      if (sep) {
        parts = code.split(sep);
      } else {
        // No separator - split by expected length
        const len = encoding === 'binary' ? 8 : encoding === 'octal' ? 3 : encoding === 'hex' ? 2 : 0;
        if (len) {
          parts = code.match(new RegExp(`.{1,${len}}`, 'g')) || [];
        } else {
          // Decimal - try comma or space
          parts = code.split(/[,\s]+/);
        }
      }
      
      return parts.map(p => {
        p = p.trim();
        if (!p) return '';
        const base = encoding === 'binary' ? 2 : encoding === 'octal' ? 8 : encoding === 'hex' ? 16 : 10;
        const num = parseInt(p, base);
        return isNaN(num) ? '' : String.fromCharCode(num);
      }).join('');
    }

    function convert() {
      if (direction === 'encode') {
        $binaryOutput.value = textToCode($textInput.value);
      } else {
        $textInput.value = codeToText($binaryOutput.value);
      }
    }

    function swap() {
      direction = direction === 'encode' ? 'decode' : 'encode';
      convert();
    }

    function updateLabel() {
      const labels = { binary: 'Binary', octal: 'Octal', decimal: 'Decimal', hex: 'Hexadecimal' };
      $outputLabel.textContent = labels[$encoding.value];
    }

    async function copyOutput() {
      const text = direction === 'encode' ? $binaryOutput.value : $textInput.value;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        showStatus("Copied!");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showStatus("Copied!");
      }
    }

    function clearAll() {
      $textInput.value = '';
      $binaryOutput.value = '';
    }

    function showStatus(msg) {
      $status.textContent = msg;
      setTimeout(() => { $status.textContent = ''; }, 2000);
    }

    $textInput.addEventListener('input', () => { direction = 'encode'; convert(); });
    $binaryOutput.addEventListener('input', () => { direction = 'decode'; convert(); });
    $separator.addEventListener('change', convert);
    $encoding.addEventListener('change', () => { updateLabel(); convert(); });

    $textInput.focus();
    updateLabel();
  </script>
</body>
</html>
