<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timer</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a;
              --success: #4ade80; --warning: #fbbf24; --danger: #f87171; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 20px; gap: 20px;
      align-items: center; justify-content: center;
    }
    .timer-display {
      position: relative;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .timer-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .timer-ring circle {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
    }
    .timer-ring-bg {
      stroke: var(--border);
    }
    .timer-ring-progress {
      stroke: var(--accent);
      transition: stroke-dashoffset 0.5s ease, stroke 0.3s ease;
    }
    .timer-ring-progress.warning {
      stroke: var(--warning);
    }
    .timer-ring-progress.danger {
      stroke: var(--danger);
    }
    .timer-time {
      font-size: 42px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      z-index: 1;
    }
    .timer-time.complete {
      color: var(--success);
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .preset-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 320px;
    }
    button {
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      transition: all 0.1s;
    }
    button:hover {
      background: var(--border);
    }
    button:active {
      transform: scale(0.98);
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-text);
    }
    button.primary:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .controls {
      display: flex;
      gap: 12px;
    }
    .custom-input {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .custom-input input {
      font: inherit;
      font-size: 14px;
      width: 60px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-elev);
      color: var(--text);
      text-align: center;
    }
    .custom-input input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .custom-input span {
      font-size: 13px;
      color: var(--muted);
    }
    footer {
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <div class="timer-display">
    <svg class="timer-ring" viewBox="0 0 100 100">
      <circle class="timer-ring-bg" cx="50" cy="50" r="42" />
      <circle class="timer-ring-progress" id="progress" cx="50" cy="50" r="42" 
              stroke-dasharray="264" stroke-dashoffset="0" />
    </svg>
    <div class="timer-time" id="display">00:00</div>
  </div>

  <div class="preset-buttons">
    <button onclick="setTimer(1)">1 min</button>
    <button onclick="setTimer(5)">5 min</button>
    <button onclick="setTimer(10)">10 min</button>
    <button onclick="setTimer(15)">15 min</button>
    <button onclick="setTimer(25)">25 min</button>
    <button onclick="setTimer(30)">30 min</button>
  </div>

  <div class="custom-input">
    <input type="number" id="customMin" min="0" max="999" placeholder="0" />
    <span>min</span>
    <input type="number" id="customSec" min="0" max="59" placeholder="0" />
    <span>sec</span>
    <button onclick="setCustomTimer()">Set</button>
  </div>

  <div class="controls">
    <button id="startBtn" class="primary" onclick="toggleTimer()">Start</button>
    <button id="resetBtn" onclick="resetTimer()" disabled>Reset</button>
  </div>

  <footer>Timer · Click a preset or enter custom time</footer>

  <script>
    "use strict";

    const $display = document.getElementById("display");
    const $progress = document.getElementById("progress");
    const $startBtn = document.getElementById("startBtn");
    const $resetBtn = document.getElementById("resetBtn");
    const $customMin = document.getElementById("customMin");
    const $customSec = document.getElementById("customSec");

    const CIRCUMFERENCE = 2 * Math.PI * 42; // 264
    let totalSeconds = 0;
    let remainingSeconds = 0;
    let isRunning = false;
    let intervalId = null;

    // Audio context for completion sound
    let audioCtx = null;

    function playCompletionSound() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const frequencies = [523.25, 659.25, 783.99]; // C5, E5, G5
        frequencies.forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.frequency.value = freq;
          osc.type = "sine";
          gain.gain.setValueAtTime(0.3, audioCtx.currentTime + i * 0.15);
          gain.gain.exponentialDecayTo = 0.01;
          gain.gain.setTargetAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.2, 0.1);
          osc.start(audioCtx.currentTime + i * 0.15);
          osc.stop(audioCtx.currentTime + i * 0.15 + 0.4);
        });
      } catch (e) {
        console.log("Audio not supported");
      }
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
    }

    function updateDisplay() {
      $display.textContent = formatTime(remainingSeconds);
      
      // Update progress ring
      const progress = totalSeconds > 0 ? remainingSeconds / totalSeconds : 1;
      const offset = CIRCUMFERENCE * (1 - progress);
      $progress.style.strokeDashoffset = offset;

      // Update color based on remaining time
      $progress.classList.remove("warning", "danger");
      if (remainingSeconds <= 10 && remainingSeconds > 0) {
        $progress.classList.add("danger");
      } else if (remainingSeconds <= 60 && remainingSeconds > 0) {
        $progress.classList.add("warning");
      }

      // Completion state
      if (remainingSeconds === 0 && totalSeconds > 0) {
        $display.classList.add("complete");
      } else {
        $display.classList.remove("complete");
      }
    }

    function setTimer(minutes) {
      stopTimer();
      totalSeconds = minutes * 60;
      remainingSeconds = totalSeconds;
      updateDisplay();
      $resetBtn.disabled = false;
    }

    function setCustomTimer() {
      const min = parseInt($customMin.value) || 0;
      const sec = parseInt($customSec.value) || 0;
      if (min === 0 && sec === 0) return;
      
      stopTimer();
      totalSeconds = min * 60 + sec;
      remainingSeconds = totalSeconds;
      updateDisplay();
      $resetBtn.disabled = false;
    }

    function toggleTimer() {
      if (isRunning) {
        stopTimer();
      } else {
        startTimer();
      }
    }

    function startTimer() {
      if (remainingSeconds === 0) return;
      
      isRunning = true;
      $startBtn.textContent = "Pause";
      $resetBtn.disabled = false;

      intervalId = setInterval(() => {
        remainingSeconds--;
        updateDisplay();

        if (remainingSeconds === 0) {
          stopTimer();
          playCompletionSound();
        }
      }, 1000);
    }

    function stopTimer() {
      isRunning = false;
      $startBtn.textContent = "Start";
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
    }

    function resetTimer() {
      stopTimer();
      remainingSeconds = totalSeconds;
      updateDisplay();
    }

    // Initialize
    $progress.style.strokeDasharray = CIRCUMFERENCE;
    updateDisplay();
  </script>
</body>
</html>
