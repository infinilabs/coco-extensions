<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slug Generator</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --success: #22c55e;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a;
              --success: #4ade80; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 20px; gap: 16px;
    }
    h1 { font-size: 18px; font-weight: 600; margin: 0; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    input[type="text"], textarea {
      font: 14px -apple-system, sans-serif;
      padding: 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-elev);
      color: var(--text);
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea { resize: none; min-height: 80px; }
    .options {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .option-group {
      display: flex; align-items: center; gap: 6px;
    }
    select {
      font: inherit; font-size: 13px;
      padding: 6px 10px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-elev);
      color: var(--text);
    }
    .checkbox-label {
      display: flex; align-items: center; gap: 4px;
      font-size: 12px; color: var(--muted); cursor: pointer;
    }
    .output-box {
      display: flex; gap: 8px; align-items: stretch;
    }
    .output {
      flex: 1; font: 14px "SF Mono", Monaco, Consolas, monospace;
      padding: 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-elev);
      color: var(--accent); word-break: break-all;
    }
    button {
      font: inherit; font-size: 13px; font-weight: 500;
      color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 16px; cursor: pointer;
    }
    button:hover { background: var(--border); }
    button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .status { font-size: 11px; color: var(--success); }
    .preview { font-size: 12px; color: var(--muted); margin-top: 8px; }
    footer { color: var(--muted); font-size: 11px; text-align: center; padding-top: 8px; border-top: 1px solid var(--border); margin-top: auto; }
  </style>
</head>
<body>
  <h1>🔗 Slug Generator</h1>
  
  <div class="field">
    <label>Input Text</label>
    <textarea id="input" placeholder="Enter text to convert to slug..."></textarea>
  </div>

  <div class="options">
    <div class="option-group">
      <label>Separator:</label>
      <select id="separator">
        <option value="-">Hyphen (-)</option>
        <option value="_">Underscore (_)</option>
        <option value=".">Dot (.)</option>
      </select>
    </div>
    <label class="checkbox-label">
      <input type="checkbox" id="lowercase" checked> Lowercase
    </label>
    <label class="checkbox-label">
      <input type="checkbox" id="maxLength"> Max length
    </label>
    <input type="number" id="maxLengthValue" value="50" min="5" max="200" style="width: 60px; padding: 4px 8px; font-size: 12px;" disabled>
  </div>

  <div class="field">
    <label>Generated Slug <span class="status" id="status"></span></label>
    <div class="output-box">
      <div class="output" id="output">-</div>
      <button class="primary" onclick="copySlug()">Copy</button>
    </div>
    <div class="preview" id="preview"></div>
  </div>

  <footer>Slug Generator · All processing local</footer>

  <script>
    "use strict";

    const $input = document.getElementById("input");
    const $output = document.getElementById("output");
    const $separator = document.getElementById("separator");
    const $lowercase = document.getElementById("lowercase");
    const $maxLength = document.getElementById("maxLength");
    const $maxLengthValue = document.getElementById("maxLengthValue");
    const $status = document.getElementById("status");
    const $preview = document.getElementById("preview");

    // Character replacements for common accented characters
    const charMap = {
      'à': 'a', 'á': 'a', 'â': 'a', 'ã': 'a', 'ä': 'a', 'å': 'a', 'æ': 'ae',
      'ç': 'c', 'è': 'e', 'é': 'e', 'ê': 'e', 'ë': 'e',
      'ì': 'i', 'í': 'i', 'î': 'i', 'ï': 'i',
      'ñ': 'n', 'ò': 'o', 'ó': 'o', 'ô': 'o', 'õ': 'o', 'ö': 'o', 'ø': 'o',
      'ù': 'u', 'ú': 'u', 'û': 'u', 'ü': 'u',
      'ý': 'y', 'ÿ': 'y', 'ß': 'ss', 'ð': 'd', 'þ': 'th'
    };

    function generateSlug() {
      let text = $input.value;
      const sep = $separator.value;
      
      // Replace accented characters
      text = text.split('').map(c => charMap[c.toLowerCase()] || c).join('');
      
      // Convert to lowercase if option is checked
      if ($lowercase.checked) {
        text = text.toLowerCase();
      }
      
      // Replace non-alphanumeric characters with separator
      text = text.replace(/[^a-zA-Z0-9]+/g, sep);
      
      // Remove leading/trailing separators
      text = text.replace(new RegExp(`^[${sep}]+|[${sep}]+$`, 'g'), '');
      
      // Apply max length
      if ($maxLength.checked) {
        const maxLen = parseInt($maxLengthValue.value) || 50;
        if (text.length > maxLen) {
          text = text.substring(0, maxLen);
          // Don't cut in middle of word if possible
          const lastSep = text.lastIndexOf(sep);
          if (lastSep > maxLen * 0.7) {
            text = text.substring(0, lastSep);
          }
        }
      }
      
      $output.textContent = text || '-';
      
      // Show preview URL
      if (text) {
        $preview.textContent = `Preview: example.com/${text}`;
      } else {
        $preview.textContent = '';
      }
    }

    async function copySlug() {
      const slug = $output.textContent;
      if (!slug || slug === '-') return;
      
      try {
        await navigator.clipboard.writeText(slug);
        showStatus("Copied!");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = slug;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showStatus("Copied!");
      }
    }

    function showStatus(msg) {
      $status.textContent = msg;
      setTimeout(() => { $status.textContent = ""; }, 2000);
    }

    // Event listeners
    $input.addEventListener("input", generateSlug);
    $separator.addEventListener("change", generateSlug);
    $lowercase.addEventListener("change", generateSlug);
    $maxLength.addEventListener("change", () => {
      $maxLengthValue.disabled = !$maxLength.checked;
      generateSlug();
    });
    $maxLengthValue.addEventListener("input", generateSlug);

    $input.focus();
  </script>
</body>
</html>
