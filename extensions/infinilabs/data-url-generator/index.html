<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data URL Generator</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --success: #22c55e;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a;
              --success: #4ade80; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 16px; gap: 12px;
    }
    h1 { font-size: 16px; font-weight: 600; margin: 0; }
    .tabs {
      display: flex; gap: 4px;
    }
    .tab {
      font: inherit; font-size: 12px; padding: 8px 16px;
      background: var(--bg-elev); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      cursor: pointer;
    }
    .tab:hover { border-color: var(--accent); }
    .tab.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .input-section { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .row { display: flex; gap: 8px; align-items: center; }
    label { font-size: 12px; color: var(--muted); }
    select, input[type="text"] {
      font: inherit; font-size: 12px;
      padding: 8px 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-elev);
      color: var(--text);
    }
    select:focus, input:focus { outline: none; border-color: var(--accent); }
    textarea {
      flex: 1; font: 12px "SF Mono", Monaco, Consolas, monospace;
      padding: 10px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-elev);
      color: var(--text); resize: none;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .drop-zone {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border: 2px dashed var(--border); border-radius: 8px;
      background: var(--bg-elev); cursor: pointer;
      min-height: 120px;
    }
    .drop-zone:hover { border-color: var(--accent); }
    .drop-zone.dragover { border-color: var(--accent); background: rgba(99, 102, 241, 0.1); }
    .drop-icon { font-size: 32px; margin-bottom: 8px; }
    .drop-text { font-size: 12px; color: var(--muted); }
    .preview { max-width: 100%; max-height: 80px; margin-top: 8px; }
    .output-section {
      background: var(--bg-elev); border-radius: 8px; padding: 12px;
    }
    .output-label {
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; margin-bottom: 6px;
      display: flex; justify-content: space-between;
    }
    .output-url {
      font: 11px "SF Mono", Monaco, Consolas, monospace;
      word-break: break-all; max-height: 80px; overflow-y: auto;
    }
    .actions { display: flex; gap: 8px; }
    button {
      font: inherit; font-size: 12px; font-weight: 500;
      color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 16px; cursor: pointer;
    }
    button:hover { background: var(--border); }
    button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .status { font-size: 11px; color: var(--success); }
    .size-info { font-size: 11px; color: var(--muted); }
    footer { color: var(--muted); font-size: 11px; text-align: center; padding-top: 8px; border-top: 1px solid var(--border); }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div class="tabs">
    <button class="tab active" data-mode="text">Text</button>
    <button class="tab" data-mode="file">File</button>
  </div>

  <div class="input-section" id="textSection">
    <div class="row">
      <label>MIME Type:</label>
      <select id="mimeType">
        <option value="text/plain">text/plain</option>
        <option value="text/html">text/html</option>
        <option value="text/css">text/css</option>
        <option value="text/javascript">text/javascript</option>
        <option value="application/json">application/json</option>
        <option value="application/xml">application/xml</option>
        <option value="image/svg+xml">image/svg+xml</option>
      </select>
    </div>
    <textarea id="textInput" placeholder="Enter text content here..."></textarea>
  </div>

  <div class="input-section" id="fileSection" style="display: none;">
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">📁</div>
      <div class="drop-text">Drop file here or click to browse</div>
      <img class="preview" id="preview" style="display: none;">
    </div>
    <input type="file" id="fileInput">
  </div>

  <div class="output-section">
    <div class="output-label">
      Data URL
      <span class="size-info" id="sizeInfo"></span>
    </div>
    <div class="output-url" id="output"></div>
  </div>

  <div class="actions">
    <button class="primary" onclick="copyOutput()">Copy Data URL</button>
    <button onclick="clearAll()">Clear</button>
    <span class="status" id="status"></span>
  </div>



  <script>
    "use strict";

    const $textSection = document.getElementById("textSection");
    const $fileSection = document.getElementById("fileSection");
    const $textInput = document.getElementById("textInput");
    const $fileInput = document.getElementById("fileInput");
    const $dropZone = document.getElementById("dropZone");
    const $preview = document.getElementById("preview");
    const $mimeType = document.getElementById("mimeType");
    const $output = document.getElementById("output");
    const $sizeInfo = document.getElementById("sizeInfo");
    const $status = document.getElementById("status");

    let currentMode = "text";

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function generateFromText() {
      const text = $textInput.value;
      if (!text) {
        $output.textContent = '';
        $sizeInfo.textContent = '';
        return;
      }

      const mime = $mimeType.value;
      const base64 = btoa(unescape(encodeURIComponent(text)));
      const dataUrl = `data:${mime};base64,${base64}`;
      
      $output.textContent = dataUrl;
      $sizeInfo.textContent = formatSize(dataUrl.length);
    }

    function generateFromFile(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const dataUrl = e.target.result;
        $output.textContent = dataUrl;
        $sizeInfo.textContent = `${formatSize(file.size)} → ${formatSize(dataUrl.length)}`;
        
        if (file.type.startsWith('image/')) {
          $preview.src = dataUrl;
          $preview.style.display = 'block';
        }
      };
      reader.readAsDataURL(file);
    }

    async function copyOutput() {
      const text = $output.textContent;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        showStatus("Copied!");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showStatus("Copied!");
      }
    }

    function clearAll() {
      $textInput.value = '';
      $output.textContent = '';
      $sizeInfo.textContent = '';
      $preview.style.display = 'none';
      $fileInput.value = '';
    }

    function showStatus(msg) {
      $status.textContent = msg;
      setTimeout(() => { $status.textContent = ''; }, 2000);
    }

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentMode = tab.dataset.mode;
        
        if (currentMode === 'text') {
          $textSection.style.display = 'flex';
          $fileSection.style.display = 'none';
        } else {
          $textSection.style.display = 'none';
          $fileSection.style.display = 'flex';
        }
        clearAll();
      });
    });

    // Text input
    $textInput.addEventListener('input', generateFromText);
    $mimeType.addEventListener('change', generateFromText);

    // File input
    $dropZone.addEventListener('click', () => $fileInput.click());
    $fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) generateFromFile(e.target.files[0]);
    });

    // Drag and drop
    $dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      $dropZone.classList.add('dragover');
    });
    $dropZone.addEventListener('dragleave', () => {
      $dropZone.classList.remove('dragover');
    });
    $dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      $dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) generateFromFile(e.dataTransfer.files[0]);
    });

    $textInput.focus();
  </script>
</body>
</html>
