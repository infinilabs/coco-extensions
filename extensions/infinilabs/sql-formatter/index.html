<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Formatter</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --success: #22c55e; --keyword: #d73a49; --string: #22863a;
      --number: #005cc5; --comment: #6a737d;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a;
              --success: #4ade80; --keyword: #f97583; --string: #85e89d;
              --number: #79b8ff; --comment: #6a737d; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 16px; gap: 12px;
    }
    h1 { font-size: 16px; font-weight: 600; margin: 0; }
    .options { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    label { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    select, input[type="number"] {
      font: inherit; font-size: 12px;
      padding: 6px 10px; border: 1px solid var(--border);
      border-radius: 4px; background: var(--bg-elev);
      color: var(--text);
    }
    input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
    .panels { display: flex; gap: 12px; flex: 1; min-height: 0; }
    .panel { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .panel-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    textarea {
      flex: 1; font: 12px "SF Mono", Monaco, Consolas, monospace;
      padding: 10px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-elev);
      color: var(--text); resize: none;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .actions { display: flex; gap: 8px; }
    button {
      font: inherit; font-size: 12px; font-weight: 500;
      color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 16px; cursor: pointer;
    }
    button:hover { background: var(--border); }
    button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .status { font-size: 11px; color: var(--success); }
    footer { color: var(--muted); font-size: 11px; text-align: center; padding-top: 8px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="options">
    <label>
      Indent:
      <input type="number" id="indent" value="2" min="1" max="8">
    </label>
    <label>
      <input type="checkbox" id="uppercase" checked>
      Uppercase Keywords
    </label>
    <label>
      <input type="checkbox" id="newlineKeywords" checked>
      Newline Before Keywords
    </label>
  </div>

  <div class="panels">
    <div class="panel">
      <span class="panel-label">Input SQL</span>
      <textarea id="input" placeholder="Paste your SQL query here..."></textarea>
    </div>
    <div class="panel">
      <span class="panel-label">Formatted SQL</span>
      <textarea id="output" readonly placeholder="Formatted SQL will appear here..."></textarea>
    </div>
  </div>

  <div class="actions">
    <button class="primary" onclick="copyOutput()">Copy Output</button>
    <button onclick="minify()">Minify</button>
    <button onclick="clearAll()">Clear</button>
    <span class="status" id="status"></span>
  </div>



  <script>
    "use strict";

    const $input = document.getElementById("input");
    const $output = document.getElementById("output");
    const $indent = document.getElementById("indent");
    const $uppercase = document.getElementById("uppercase");
    const $newlineKeywords = document.getElementById("newlineKeywords");
    const $status = document.getElementById("status");

    const KEYWORDS = [
      'SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'ORDER BY', 'GROUP BY',
      'HAVING', 'LIMIT', 'OFFSET', 'JOIN', 'LEFT JOIN', 'RIGHT JOIN',
      'INNER JOIN', 'OUTER JOIN', 'FULL JOIN', 'CROSS JOIN', 'ON',
      'INSERT INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE FROM',
      'CREATE TABLE', 'ALTER TABLE', 'DROP TABLE', 'CREATE INDEX',
      'AS', 'IN', 'NOT IN', 'EXISTS', 'NOT EXISTS', 'BETWEEN',
      'LIKE', 'IS NULL', 'IS NOT NULL', 'DISTINCT', 'UNION', 'UNION ALL',
      'CASE', 'WHEN', 'THEN', 'ELSE', 'END', 'ASC', 'DESC',
      'NULL', 'TRUE', 'FALSE', 'NOT', 'PRIMARY KEY', 'FOREIGN KEY',
      'REFERENCES', 'DEFAULT', 'AUTO_INCREMENT', 'UNIQUE', 'INDEX',
      'IF', 'ELSE', 'BEGIN', 'COMMIT', 'ROLLBACK', 'TRANSACTION'
    ];

    const NEWLINE_KEYWORDS = [
      'SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'ORDER BY', 'GROUP BY',
      'HAVING', 'LIMIT', 'JOIN', 'LEFT JOIN', 'RIGHT JOIN', 'INNER JOIN',
      'OUTER JOIN', 'FULL JOIN', 'CROSS JOIN', 'ON', 'INSERT INTO',
      'VALUES', 'UPDATE', 'SET', 'DELETE FROM', 'UNION', 'UNION ALL',
      'WHEN', 'ELSE'
    ];

    function formatSQL(sql) {
      if (!sql.trim()) return '';

      const indentStr = ' '.repeat(parseInt($indent.value) || 2);
      const useUppercase = $uppercase.checked;
      const useNewlines = $newlineKeywords.checked;

      // Normalize whitespace
      let formatted = sql.replace(/\s+/g, ' ').trim();

      // Protect strings
      const strings = [];
      formatted = formatted.replace(/'[^']*'/g, (m) => {
        strings.push(m);
        return `__STR${strings.length - 1}__`;
      });

      // Format keywords
      KEYWORDS.forEach(kw => {
        const regex = new RegExp('\\b' + kw.replace(/ /g, '\\s+') + '\\b', 'gi');
        formatted = formatted.replace(regex, useUppercase ? kw : kw.toLowerCase());
      });

      // Add newlines before major keywords
      if (useNewlines) {
        NEWLINE_KEYWORDS.forEach(kw => {
          const pattern = useUppercase ? kw : kw.toLowerCase();
          const regex = new RegExp('\\s+(' + pattern.replace(/ /g, '\\s+') + ')\\b', 'gi');
          formatted = formatted.replace(regex, '\n$1');
        });
      }

      // Format parentheses
      formatted = formatted.replace(/\(\s*/g, '(\n' + indentStr);
      formatted = formatted.replace(/\s*\)/g, '\n)');

      // Format commas
      formatted = formatted.replace(/,\s*/g, ',\n' + indentStr);

      // Clean up multiple newlines
      formatted = formatted.replace(/\n\s*\n/g, '\n');

      // Indent nested content
      const lines = formatted.split('\n');
      let depth = 0;
      formatted = lines.map(line => {
        line = line.trim();
        if (!line) return '';
        
        if (line.startsWith(')')) depth = Math.max(0, depth - 1);
        const indented = indentStr.repeat(depth) + line;
        if (line.endsWith('(')) depth++;
        
        return indented;
      }).filter(l => l).join('\n');

      // Restore strings
      strings.forEach((s, i) => {
        formatted = formatted.replace(`__STR${i}__`, s);
      });

      return formatted;
    }

    function format() {
      $output.value = formatSQL($input.value);
    }

    function minify() {
      let sql = $input.value;
      // Protect strings
      const strings = [];
      sql = sql.replace(/'[^']*'/g, (m) => {
        strings.push(m);
        return `__STR${strings.length - 1}__`;
      });
      
      // Remove extra whitespace
      sql = sql.replace(/\s+/g, ' ').trim();
      
      // Restore strings
      strings.forEach((s, i) => {
        sql = sql.replace(`__STR${i}__`, s);
      });
      
      $output.value = sql;
    }

    async function copyOutput() {
      if (!$output.value) return;
      try {
        await navigator.clipboard.writeText($output.value);
        showStatus("Copied!");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = $output.value;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showStatus("Copied!");
      }
    }

    function clearAll() {
      $input.value = '';
      $output.value = '';
    }

    function showStatus(msg) {
      $status.textContent = msg;
      setTimeout(() => { $status.textContent = ''; }, 2000);
    }

    $input.addEventListener('input', format);
    $indent.addEventListener('change', format);
    $uppercase.addEventListener('change', format);
    $newlineKeywords.addEventListener('change', format);
    $input.focus();
  </script>
</body>
</html>
