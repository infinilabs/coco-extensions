<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Entity Encoder</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --success: #22c55e; --error: #ef4444;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a;
              --success: #4ade80; --error: #f87171; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 20px; gap: 16px;
    }
    h1 { font-size: 18px; font-weight: 600; margin: 0; }
    .tabs { display: flex; gap: 4px; }
    .tab {
      font: inherit; font-size: 12px; font-weight: 500;
      padding: 6px 12px; border-radius: 6px;
      background: var(--bg-elev); color: var(--muted);
      border: 1px solid var(--border); cursor: pointer;
    }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-height: 0; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; display: flex; justify-content: space-between; }
    textarea {
      flex: 1; font: 13px "SF Mono", Monaco, Consolas, monospace;
      padding: 12px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg-elev);
      color: var(--text); resize: none; min-height: 100px;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .actions { display: flex; gap: 8px; justify-content: center; }
    button {
      font: inherit; font-size: 13px; font-weight: 500;
      color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 16px; cursor: pointer; transition: all 0.15s;
    }
    button:hover { background: var(--border); }
    button:active { transform: scale(0.98); }
    button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    button.primary:hover { opacity: 0.9; }
    .status { font-size: 11px; padding: 4px 8px; border-radius: 4px; }
    .status.success { background: var(--success); color: white; }
    .reference {
      display: flex; gap: 8px; flex-wrap: wrap;
      font-size: 11px; color: var(--muted);
      padding: 8px; background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px;
    }
    .ref-item { 
      font-family: "SF Mono", Monaco, Consolas, monospace;
      cursor: pointer; padding: 2px 6px;
      border-radius: 3px; background: var(--bg);
    }
    .ref-item:hover { color: var(--accent); }
    footer {
      color: var(--muted); font-size: 11px;
      text-align: center; padding-top: 8px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="tabs">
    <button class="tab active" data-mode="named" onclick="setMode('named')">Named Entities</button>
    <button class="tab" data-mode="numeric" onclick="setMode('numeric')">Numeric</button>
    <button class="tab" data-mode="all" onclick="setMode('all')">All Characters</button>
  </div>

  <div class="field">
    <label>Input <span id="status"></span></label>
    <textarea id="input" placeholder="Enter text to encode/decode..."></textarea>
  </div>

  <div class="actions">
    <button class="primary" onclick="encode()">Encode ↓</button>
    <button class="primary" onclick="decode()">Decode ↑</button>
    <button onclick="swap()">⇅ Swap</button>
    <button onclick="copyOutput()">Copy</button>
  </div>

  <div class="field">
    <label>Output</label>
    <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
  </div>

  <div class="reference">
    <span>Common:</span>
    <span class="ref-item" onclick="insertRef('&amp;')">&amp; → &amp;amp;</span>
    <span class="ref-item" onclick="insertRef('&lt;')">&lt; → &amp;lt;</span>
    <span class="ref-item" onclick="insertRef('&gt;')">&gt; → &amp;gt;</span>
    <span class="ref-item" onclick="insertRef('&quot;')">" → &amp;quot;</span>
    <span class="ref-item" onclick="insertRef('&#39;')">' → &amp;#39;</span>
    <span class="ref-item" onclick="insertRef('&nbsp;')">  → &amp;nbsp;</span>
  </div>



  <script>
    "use strict";

    const NAMED_ENTITIES = {
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;",
      "'": "&#39;", " ": "&nbsp;", "©": "&copy;", "®": "&reg;",
      "™": "&trade;", "€": "&euro;", "£": "&pound;", "¥": "&yen;",
      "—": "&mdash;", "–": "&ndash;", "…": "&hellip;", "•": "&bull;",
      "←": "&larr;", "→": "&rarr;", "↑": "&uarr;", "↓": "&darr;",
      "×": "&times;", "÷": "&divide;", "±": "&plusmn;", "≠": "&ne;",
      "≤": "&le;", "≥": "&ge;", "°": "&deg;", "¶": "&para;", "§": "&sect;"
    };

    const DECODE_MAP = Object.fromEntries(
      Object.entries(NAMED_ENTITIES).map(([k, v]) => [v, k])
    );

    let mode = "named";
    const $input = document.getElementById("input");
    const $output = document.getElementById("output");
    const $status = document.getElementById("status");

    function setMode(m) {
      mode = m;
      document.querySelectorAll(".tab").forEach(t => {
        t.classList.toggle("active", t.dataset.mode === m);
      });
      if ($input.value) encode();
    }

    function showStatus(msg) {
      $status.textContent = msg;
      $status.className = "status success";
      setTimeout(() => { $status.textContent = ""; $status.className = ""; }, 2000);
    }

    function encode() {
      const input = $input.value;
      if (!input) { $output.value = ""; return; }

      let result;
      if (mode === "named") {
        // Only encode special HTML characters
        result = input.replace(/[&<>"']/g, c => NAMED_ENTITIES[c] || c);
      } else if (mode === "numeric") {
        // Encode special chars as numeric entities
        result = input.replace(/[&<>"']/g, c => `&#${c.charCodeAt(0)};`);
      } else {
        // Encode ALL non-ASCII as numeric
        result = input.split("").map(c => {
          const code = c.charCodeAt(0);
          if (code > 127 || /[&<>"']/.test(c)) {
            return `&#${code};`;
          }
          return c;
        }).join("");
      }

      $output.value = result;
      showStatus("Encoded");
    }

    function decode() {
      const input = $input.value;
      if (!input) { $output.value = ""; return; }

      // Decode named entities
      let result = input;
      for (const [entity, char] of Object.entries(DECODE_MAP)) {
        result = result.split(entity).join(char);
      }
      
      // Decode numeric entities (&#nnnn; and &#xhhhh;)
      result = result.replace(/&#(\d+);/g, (_, num) => String.fromCharCode(parseInt(num, 10)));
      result = result.replace(/&#x([0-9a-fA-F]+);/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));

      $output.value = result;
      showStatus("Decoded");
    }

    function swap() {
      const tmp = $input.value;
      $input.value = $output.value;
      $output.value = tmp;
    }

    function insertRef(char) {
      $input.value += char;
      $input.focus();
    }

    async function copyOutput() {
      if (!$output.value) return;
      try {
        await navigator.clipboard.writeText($output.value);
        showStatus("Copied!");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = $output.value;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showStatus("Copied!");
      }
    }

    $input.focus();
  </script>
</body>
</html>
