<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorem Ipsum Generator</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --success: #22c55e;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a;
              --success: #4ade80; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 20px; gap: 16px;
    }
    h1 { font-size: 18px; font-weight: 600; margin: 0; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    select, input[type="number"] {
      font: inherit; font-size: 13px;
      padding: 8px 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-elev);
      color: var(--text);
    }
    select:focus, input:focus { outline: none; border-color: var(--accent); }
    input[type="number"] { width: 80px; }
    .actions { display: flex; gap: 8px; }
    button {
      font: inherit; font-size: 13px; font-weight: 500;
      color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 16px; cursor: pointer;
    }
    button:hover { background: var(--border); }
    button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    button.primary:hover { opacity: 0.9; }
    .output {
      flex: 1; font: 13px/1.6 Georgia, "Times New Roman", serif;
      padding: 16px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg-elev);
      overflow-y: auto; min-height: 150px;
    }
    .status { font-size: 11px; color: var(--success); margin-left: 8px; }
    footer {
      color: var(--muted); font-size: 11px;
      text-align: center; padding-top: 8px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <h1>📝 Lorem Ipsum Generator</h1>
  
  <div class="controls">
    <div class="field">
      <label>Type</label>
      <select id="type">
        <option value="paragraphs">Paragraphs</option>
        <option value="sentences">Sentences</option>
        <option value="words">Words</option>
      </select>
    </div>
    <div class="field">
      <label>Count</label>
      <input type="number" id="count" value="3" min="1" max="100">
    </div>
    <div class="actions">
      <button class="primary" onclick="generate()">Generate</button>
      <button onclick="copyOutput()">Copy</button>
    </div>
    <span class="status" id="status"></span>
  </div>

  <div class="output" id="output"></div>

  <footer>Lorem Ipsum Generator · Classic placeholder text</footer>

  <script>
    "use strict";

    const WORDS = [
      "lorem", "ipsum", "dolor", "sit", "amet", "consectetur", "adipiscing", "elit",
      "sed", "do", "eiusmod", "tempor", "incididunt", "ut", "labore", "et", "dolore",
      "magna", "aliqua", "enim", "ad", "minim", "veniam", "quis", "nostrud",
      "exercitation", "ullamco", "laboris", "nisi", "aliquip", "ex", "ea", "commodo",
      "consequat", "duis", "aute", "irure", "in", "reprehenderit", "voluptate",
      "velit", "esse", "cillum", "fugiat", "nulla", "pariatur", "excepteur", "sint",
      "occaecat", "cupidatat", "non", "proident", "sunt", "culpa", "qui", "officia",
      "deserunt", "mollit", "anim", "id", "est", "laborum", "vivamus", "lacus",
      "vel", "augue", "laoreet", "rutrum", "faucibus", "auctor", "dui", "sapien",
      "feugiat", "accumsan", "bibendum", "elementum", "nibh", "tellus", "molestie",
      "nunc", "pulvinar", "mattis", "integer", "turpis", "massa", "tincidunt",
      "at", "maecenas", "pharetra", "convallis", "posuere", "morbi", "leo"
    ];

    const FIRST_PARA = "Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.";

    function getRandomWord() {
      return WORDS[Math.floor(Math.random() * WORDS.length)];
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function generateSentence(minWords = 8, maxWords = 16) {
      const len = minWords + Math.floor(Math.random() * (maxWords - minWords + 1));
      const words = [];
      for (let i = 0; i < len; i++) {
        words.push(getRandomWord());
      }
      return capitalize(words.join(" ")) + ".";
    }

    function generateParagraph(minSentences = 4, maxSentences = 8) {
      const len = minSentences + Math.floor(Math.random() * (maxSentences - minSentences + 1));
      const sentences = [];
      for (let i = 0; i < len; i++) {
        sentences.push(generateSentence());
      }
      return sentences.join(" ");
    }

    function generate() {
      const type = document.getElementById("type").value;
      const count = Math.min(100, Math.max(1, parseInt(document.getElementById("count").value) || 1));
      
      let result = "";
      
      if (type === "paragraphs") {
        const paras = [];
        for (let i = 0; i < count; i++) {
          if (i === 0) {
            paras.push(FIRST_PARA + " " + generateParagraph(3, 6));
          } else {
            paras.push(generateParagraph());
          }
        }
        result = paras.join("\n\n");
      } else if (type === "sentences") {
        const sentences = [];
        sentences.push(FIRST_PARA);
        for (let i = 1; i < count; i++) {
          sentences.push(generateSentence());
        }
        result = sentences.join(" ");
      } else {
        const words = ["Lorem", "ipsum", "dolor", "sit", "amet"];
        for (let i = words.length; i < count; i++) {
          words.push(getRandomWord());
        }
        result = words.slice(0, count).join(" ");
      }
      
      document.getElementById("output").textContent = result;
    }

    async function copyOutput() {
      const text = document.getElementById("output").textContent;
      if (!text) return;
      
      try {
        await navigator.clipboard.writeText(text);
        showStatus("Copied!");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showStatus("Copied!");
      }
    }

    function showStatus(msg) {
      const status = document.getElementById("status");
      status.textContent = msg;
      setTimeout(() => { status.textContent = ""; }, 2000);
    }

    // Generate initial content
    generate();
  </script>
</body>
</html>
