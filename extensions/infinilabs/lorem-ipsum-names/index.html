<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorem Ipsum Names</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --success: #22c55e;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a;
              --success: #4ade80; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 16px; gap: 14px;
    }
    h1 { font-size: 16px; font-weight: 600; margin: 0; }
    .options {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    label {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px;
    }
    select, input[type="number"] {
      font: inherit; font-size: 12px;
      padding: 6px 10px; border: 1px solid var(--border);
      border-radius: 4px; background: var(--bg-elev);
      color: var(--text); width: 100px;
    }
    input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--accent);
    }
    .name-list {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
    }
    .name-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; background: var(--bg-elev);
      border-radius: 6px; cursor: pointer;
    }
    .name-item:hover { outline: 1px solid var(--accent); }
    .name-text { font-size: 14px; font-weight: 500; }
    .name-meta { font-size: 11px; color: var(--muted); }
    .actions { display: flex; gap: 8px; }
    button {
      font: inherit; font-size: 12px; font-weight: 500;
      color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 16px; cursor: pointer;
    }
    button:hover { background: var(--border); }
    button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .status { font-size: 11px; color: var(--success); }
    footer { color: var(--muted); font-size: 11px; text-align: center; padding-top: 8px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <h1>👤 Lorem Ipsum Names</h1>

  <div class="options">
    <label>
      Count:
      <input type="number" id="count" value="10" min="1" max="100">
    </label>
    <label>
      Gender:
      <select id="gender">
        <option value="any">Any</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </label>
    <label>
      <input type="checkbox" id="includeEmail" checked>
      Email
    </label>
  </div>

  <div class="name-list" id="nameList"></div>

  <div class="actions">
    <button class="primary" onclick="generate()">🔄 Generate</button>
    <button onclick="copyAll()">Copy All</button>
    <span class="status" id="status"></span>
  </div>

  <footer>Lorem Ipsum Names · Click a name to copy</footer>

  <script>
    "use strict";

    const firstNamesMale = [
      "James", "John", "Robert", "Michael", "William", "David", "Joseph", "Charles",
      "Thomas", "Daniel", "Matthew", "Anthony", "Mark", "Donald", "Steven", "Paul",
      "Andrew", "Joshua", "Kenneth", "Kevin", "Brian", "George", "Timothy", "Ronald",
      "Edward", "Jason", "Jeffrey", "Ryan", "Jacob", "Gary", "Nicholas", "Eric",
      "Jonathan", "Stephen", "Larry", "Justin", "Scott", "Brandon", "Benjamin", "Samuel"
    ];

    const firstNamesFemale = [
      "Mary", "Patricia", "Jennifer", "Linda", "Barbara", "Elizabeth", "Susan", "Jessica",
      "Sarah", "Karen", "Lisa", "Nancy", "Betty", "Margaret", "Sandra", "Ashley",
      "Dorothy", "Kimberly", "Emily", "Donna", "Michelle", "Dorothy", "Carol", "Amanda",
      "Melissa", "Deborah", "Stephanie", "Rebecca", "Sharon", "Laura", "Cynthia", "Kathleen",
      "Amy", "Angela", "Shirley", "Anna", "Brenda", "Pamela", "Emma", "Nicole"
    ];

    const lastNames = [
      "Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis",
      "Rodriguez", "Martinez", "Hernandez", "Lopez", "Gonzalez", "Wilson", "Anderson",
      "Thomas", "Taylor", "Moore", "Jackson", "Martin", "Lee", "Perez", "Thompson",
      "White", "Harris", "Sanchez", "Clark", "Ramirez", "Lewis", "Robinson", "Walker",
      "Young", "Allen", "King", "Wright", "Scott", "Torres", "Nguyen", "Hill", "Flores"
    ];

    const domains = ["email.com", "mail.com", "inbox.com", "work.net", "company.org"];

    const $count = document.getElementById("count");
    const $gender = document.getElementById("gender");
    const $includeEmail = document.getElementById("includeEmail");
    const $nameList = document.getElementById("nameList");
    const $status = document.getElementById("status");

    let names = [];

    function random(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateName(gender) {
      const g = gender === 'any' ? (Math.random() < 0.5 ? 'male' : 'female') : gender;
      const firstName = random(g === 'male' ? firstNamesMale : firstNamesFemale);
      const lastName = random(lastNames);
      const email = $includeEmail.checked 
        ? `${firstName.toLowerCase()}.${lastName.toLowerCase()}@${random(domains)}`
        : null;
      return { firstName, lastName, fullName: `${firstName} ${lastName}`, email, gender: g };
    }

    function generate() {
      const count = Math.min(Math.max(parseInt($count.value) || 10, 1), 100);
      const gender = $gender.value;
      
      names = [];
      for (let i = 0; i < count; i++) {
        names.push(generateName(gender));
      }
      
      render();
    }

    function render() {
      $nameList.innerHTML = '';
      names.forEach((n, i) => {
        const item = document.createElement('div');
        item.className = 'name-item';
        item.innerHTML = `
          <div>
            <div class="name-text">${n.fullName}</div>
            ${n.email ? `<div class="name-meta">${n.email}</div>` : ''}
          </div>
          <span class="name-meta">${n.gender === 'male' ? '♂' : '♀'}</span>
        `;
        item.addEventListener('click', () => copyName(n));
        $nameList.appendChild(item);
      });
    }

    async function copyName(n) {
      const text = n.email ? `${n.fullName}\n${n.email}` : n.fullName;
      await copyText(text);
      showStatus("Copied: " + n.fullName);
    }

    async function copyAll() {
      const text = names.map(n => n.email ? `${n.fullName}, ${n.email}` : n.fullName).join('\n');
      await copyText(text);
      showStatus(`Copied ${names.length} names`);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
    }

    function showStatus(msg) {
      $status.textContent = msg;
      setTimeout(() => { $status.textContent = ''; }, 2000);
    }

    generate();
  </script>
</body>
</html>
