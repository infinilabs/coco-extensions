<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Encoder/Decoder</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --success: #22c55e; --error: #ef4444;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a;
              --success: #4ade80; --error: #f87171; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 20px; gap: 16px;
    }
    h1 { font-size: 18px; font-weight: 600; margin: 0; display: flex; align-items: center; gap: 8px; }
    .tabs { display: flex; gap: 4px; }
    .tab {
      font: inherit; font-size: 12px; font-weight: 500;
      padding: 6px 12px; border-radius: 6px;
      background: var(--bg-elev); color: var(--muted);
      border: 1px solid var(--border); cursor: pointer;
    }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-height: 0; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
    textarea {
      flex: 1; font: 13px "SF Mono", Monaco, Consolas, monospace;
      padding: 12px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg-elev);
      color: var(--text); resize: none; min-height: 80px;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .actions { display: flex; gap: 8px; justify-content: center; }
    button {
      font: inherit; font-size: 13px; font-weight: 500;
      color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 16px; cursor: pointer; transition: all 0.15s;
    }
    button:hover { background: var(--border); }
    button:active { transform: scale(0.98); }
    button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    button.primary:hover { opacity: 0.9; }
    .status { font-size: 11px; padding: 4px 8px; border-radius: 4px; }
    .status.success { background: var(--success); color: white; }
    .status.error { background: var(--error); color: white; }
    footer {
      color: var(--muted); font-size: 11px;
      text-align: center; padding-top: 8px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <h1>🔗 URL Encoder/Decoder</h1>
  
  <div class="tabs">
    <button class="tab active" onclick="setMode('component')">Component</button>
    <button class="tab" onclick="setMode('full')">Full URL</button>
  </div>

  <div class="field">
    <label>Input <span id="status"></span></label>
    <textarea id="input" placeholder="Enter text to encode/decode..."></textarea>
  </div>

  <div class="actions">
    <button class="primary" onclick="encode()">Encode ↓</button>
    <button class="primary" onclick="decode()">Decode ↑</button>
    <button onclick="swap()">⇅ Swap</button>
    <button onclick="copyOutput()">Copy</button>
  </div>

  <div class="field">
    <label>Output</label>
    <textarea id="output" readonly placeholder="Result will appear here..."></textarea>
  </div>



  <script>
    "use strict";
    
    let mode = "component";
    const $input = document.getElementById("input");
    const $output = document.getElementById("output");
    const $status = document.getElementById("status");
    const $tabs = document.querySelectorAll(".tab");

    function setMode(m) {
      mode = m;
      $tabs.forEach(t => t.classList.toggle("active", t.textContent.toLowerCase().includes(m)));
      if ($input.value) encode();
    }

    function showStatus(msg, type) {
      $status.textContent = msg;
      $status.className = "status " + type;
      setTimeout(() => { $status.textContent = ""; $status.className = ""; }, 2000);
    }

    function encode() {
      try {
        const input = $input.value;
        if (!input) {
          $output.value = "";
          return;
        }
        $output.value = mode === "component" 
          ? encodeURIComponent(input)
          : encodeURI(input);
        showStatus("Encoded", "success");
      } catch (e) {
        showStatus("Error: " + e.message, "error");
      }
    }

    function decode() {
      try {
        const input = $input.value;
        if (!input) {
          $output.value = "";
          return;
        }
        $output.value = mode === "component"
          ? decodeURIComponent(input)
          : decodeURI(input);
        showStatus("Decoded", "success");
      } catch (e) {
        showStatus("Error: Invalid encoding", "error");
      }
    }

    function swap() {
      const tmp = $input.value;
      $input.value = $output.value;
      $output.value = tmp;
    }

    async function copyOutput() {
      if (!$output.value) return;
      try {
        await navigator.clipboard.writeText($output.value);
        showStatus("Copied!", "success");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = $output.value;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showStatus("Copied!", "success");
      }
    }

    $input.addEventListener("input", () => {
      // Auto-detect and decode/encode on paste
    });

    $input.focus();
  </script>
</body>
</html>
