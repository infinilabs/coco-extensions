<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>String Escape</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --success: #22c55e; --error: #ef4444;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a;
              --success: #4ade80; --error: #f87171; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 16px; gap: 12px;
    }
    h1 { font-size: 16px; font-weight: 600; margin: 0; }
    .format-tabs {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .tab {
      font: inherit; font-size: 12px; padding: 6px 12px;
      background: var(--bg-elev); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      cursor: pointer;
    }
    .tab:hover { border-color: var(--accent); }
    .tab.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-height: 0; }
    label {
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; display: flex; justify-content: space-between;
    }
    textarea {
      flex: 1; font: 12px "SF Mono", Monaco, Consolas, monospace;
      padding: 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-elev);
      color: var(--text); resize: none; min-height: 100px;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .actions { display: flex; gap: 8px; justify-content: center; }
    button {
      font: inherit; font-size: 12px; font-weight: 500;
      color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 16px; cursor: pointer;
    }
    button:hover { background: var(--border); }
    button.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
    .status { font-size: 11px; color: var(--success); }
    footer { color: var(--muted); font-size: 11px; text-align: center; padding-top: 8px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <h1>🔤 String Escape</h1>
  
  <div class="format-tabs">
    <button class="tab active" data-format="json">JSON</button>
    <button class="tab" data-format="xml">XML</button>
    <button class="tab" data-format="html">HTML</button>
    <button class="tab" data-format="url">URL</button>
    <button class="tab" data-format="regex">Regex</button>
  </div>

  <div class="field">
    <label>Input <span class="status" id="status"></span></label>
    <textarea id="input" placeholder="Enter text to escape/unescape..."></textarea>
  </div>

  <div class="actions">
    <button class="primary" onclick="escape()">Escape ↓</button>
    <button class="primary" onclick="unescape()">Unescape ↑</button>
    <button onclick="copyOutput()">Copy Output</button>
    <button onclick="swap()">⇅ Swap</button>
  </div>

  <div class="field">
    <label>Output</label>
    <textarea id="output" placeholder="Result will appear here..." readonly></textarea>
  </div>



  <script>
    "use strict";

    let currentFormat = "json";
    const $input = document.getElementById("input");
    const $output = document.getElementById("output");
    const $status = document.getElementById("status");

    // Tab switching
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentFormat = tab.dataset.format;
      });
    });

    const escapers = {
      json: {
        escape: s => JSON.stringify(s).slice(1, -1),
        unescape: s => { try { return JSON.parse(`"${s}"`); } catch { return s; } }
      },
      xml: {
        escape: s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                       .replace(/"/g, "&quot;").replace(/'/g, "&apos;"),
        unescape: s => s.replace(/&apos;/g, "'").replace(/&quot;/g, '"')
                        .replace(/&gt;/g, ">").replace(/&lt;/g, "<").replace(/&amp;/g, "&")
      },
      html: {
        escape: s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                       .replace(/"/g, "&quot;").replace(/'/g, "&#39;"),
        unescape: s => {
          const ta = document.createElement("textarea");
          ta.innerHTML = s;
          return ta.value;
        }
      },
      url: {
        escape: s => encodeURIComponent(s),
        unescape: s => { try { return decodeURIComponent(s); } catch { return s; } }
      },
      regex: {
        escape: s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"),
        unescape: s => s.replace(/\\([.*+?^${}()|[\]\\])/g, "$1")
      }
    };

    function escape() {
      const input = $input.value;
      try {
        $output.value = escapers[currentFormat].escape(input);
        showStatus("Escaped!");
      } catch (e) {
        showStatus("Error: " + e.message, true);
      }
    }

    function unescape() {
      const input = $input.value;
      try {
        $output.value = escapers[currentFormat].unescape(input);
        showStatus("Unescaped!");
      } catch (e) {
        showStatus("Error: " + e.message, true);
      }
    }

    function swap() {
      const tmp = $input.value;
      $input.value = $output.value;
      $output.value = tmp;
    }

    async function copyOutput() {
      const text = $output.value;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        showStatus("Copied!");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showStatus("Copied!");
      }
    }

    function showStatus(msg, isError = false) {
      $status.textContent = msg;
      $status.style.color = isError ? "var(--error)" : "var(--success)";
      setTimeout(() => { $status.textContent = ""; }, 2000);
    }

    $input.focus();
  </script>
</body>
</html>
