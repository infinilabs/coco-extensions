<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Preview</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --code-bg: #f0f0f0;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --code-bg: #1a1a1a; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 16px; gap: 12px;
    }
    h1 { font-size: 16px; font-weight: 600; margin: 0; }
    .container { display: flex; gap: 12px; flex: 1; min-height: 0; }
    .pane { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    textarea {
      flex: 1; font: 13px "SF Mono", Monaco, Consolas, monospace;
      padding: 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-elev);
      color: var(--text); resize: none; line-height: 1.5;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .preview {
      flex: 1; padding: 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-elev);
      overflow-y: auto; line-height: 1.6;
    }
    /* Markdown styles */
    .preview h1 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; margin: 0.5em 0; }
    .preview h2 { font-size: 1.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; margin: 0.5em 0; }
    .preview h3 { font-size: 1.15em; margin: 0.5em 0; }
    .preview h4, .preview h5, .preview h6 { font-size: 1em; margin: 0.5em 0; }
    .preview p { margin: 0.5em 0; }
    .preview code {
      font-family: "SF Mono", Monaco, Consolas, monospace;
      background: var(--code-bg); padding: 2px 6px; border-radius: 3px; font-size: 0.9em;
    }
    .preview pre {
      background: var(--code-bg); padding: 12px; border-radius: 6px;
      overflow-x: auto; margin: 0.5em 0;
    }
    .preview pre code { background: none; padding: 0; }
    .preview blockquote {
      border-left: 3px solid var(--accent); margin: 0.5em 0;
      padding-left: 1em; color: var(--muted);
    }
    .preview ul, .preview ol { margin: 0.5em 0; padding-left: 1.5em; }
    .preview li { margin: 0.25em 0; }
    .preview a { color: var(--accent); }
    .preview hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
    .preview table { border-collapse: collapse; margin: 0.5em 0; }
    .preview th, .preview td { border: 1px solid var(--border); padding: 6px 12px; }
    .preview th { background: var(--code-bg); }
    .preview img { max-width: 100%; }
    .preview strong { font-weight: 600; }
    .preview em { font-style: italic; }
  </style>
</head>
<body>
  <h1>📄 Markdown Preview</h1>
  
  <div class="container">
    <div class="pane">
      <label>Markdown</label>
      <textarea id="input" placeholder="Type or paste Markdown here..."></textarea>
    </div>
    <div class="pane">
      <label>Preview</label>
      <div class="preview" id="preview"></div>
    </div>
  </div>

  <script>
    "use strict";

    const $input = document.getElementById("input");
    const $preview = document.getElementById("preview");

    // Simple Markdown parser
    function parseMarkdown(md) {
      let html = md;
      
      // Escape HTML first
      html = html.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      
      // Code blocks (before other processing)
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        return `<pre><code>${code.trim()}</code></pre>`;
      });
      
      // Inline code
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      
      // Headers
      html = html.replace(/^###### (.+)$/gm, "<h6>$1</h6>");
      html = html.replace(/^##### (.+)$/gm, "<h5>$1</h5>");
      html = html.replace(/^#### (.+)$/gm, "<h4>$1</h4>");
      html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
      html = html.replace(/^## (.+)$/gm, "<h2>$1</h2>");
      html = html.replace(/^# (.+)$/gm, "<h1>$1</h1>");
      
      // Bold and italic
      html = html.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
      html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
      html = html.replace(/___(.+?)___/g, "<strong><em>$1</em></strong>");
      html = html.replace(/__(.+?)__/g, "<strong>$1</strong>");
      html = html.replace(/_(.+?)_/g, "<em>$1</em>");
      
      // Strikethrough
      html = html.replace(/~~(.+?)~~/g, "<del>$1</del>");
      
      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      
      // Images
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
      
      // Blockquotes
      html = html.replace(/^&gt; (.+)$/gm, "<blockquote>$1</blockquote>");
      
      // Horizontal rules
      html = html.replace(/^---+$/gm, "<hr>");
      html = html.replace(/^\*\*\*+$/gm, "<hr>");
      
      // Unordered lists
      html = html.replace(/^[\*\-\+] (.+)$/gm, "<li>$1</li>");
      html = html.replace(/(<li>.*<\/li>\n?)+/g, "<ul>$&</ul>");
      
      // Ordered lists
      html = html.replace(/^\d+\. (.+)$/gm, "<li>$1</li>");
      
      // Paragraphs (lines not already wrapped)
      html = html.replace(/^(?!<[hublop]|<li|<hr|<pre|<block)(.+)$/gm, "<p>$1</p>");
      
      // Clean up empty paragraphs
      html = html.replace(/<p>\s*<\/p>/g, "");
      
      // Fix nested blockquotes
      html = html.replace(/<\/blockquote>\n<blockquote>/g, "<br>");
      
      return html;
    }

    function render() {
      const md = $input.value;
      $preview.innerHTML = parseMarkdown(md);
    }

    $input.addEventListener("input", render);

    // Initial sample content
    $input.value = `# Markdown Preview

This is a **live** preview of your *Markdown* text.

## Features

- Headers (h1-h6)
- **Bold** and *italic* text
- \`Inline code\`
- [Links](https://example.com)
- Lists (ordered and unordered)

### Code Blocks

\`\`\`javascript
function hello() {
  console.log("Hello, World!");
}
\`\`\`

> Blockquotes are also supported

---

Enjoy writing!`;

    render();
    $input.focus();
  </script>
</body>
</html>
