<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Counter</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 16px; gap: 16px;
    }
    h1 { font-size: 16px; font-weight: 600; margin: 0; }
    .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-height: 0; }
    label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    textarea {
      flex: 1; font: 13px -apple-system, sans-serif;
      padding: 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-elev);
      color: var(--text); resize: none; min-height: 150px;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    }
    .stat {
      background: var(--bg-elev); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; text-align: center;
    }
    .stat-value {
      font-size: 24px; font-weight: 700; color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
    .detailed-stats {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
      font-size: 12px;
    }
    .detail-row {
      display: flex; justify-content: space-between;
      padding: 6px 10px; background: var(--bg-elev);
      border-radius: 4px;
    }
    .detail-label { color: var(--muted); }
    .detail-value { font-weight: 500; font-variant-numeric: tabular-nums; }
    footer { color: var(--muted); font-size: 11px; text-align: center; padding-top: 8px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <h1>📊 Character Counter</h1>
  
  <div class="field">
    <label>Input Text</label>
    <textarea id="input" placeholder="Type or paste text here to analyze..."></textarea>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="charCount">0</div>
      <div class="stat-label">Characters</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="wordCount">0</div>
      <div class="stat-label">Words</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="lineCount">0</div>
      <div class="stat-label">Lines</div>
    </div>
  </div>

  <div class="detailed-stats">
    <div class="detail-row">
      <span class="detail-label">Characters (no spaces)</span>
      <span class="detail-value" id="charNoSpace">0</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Sentences</span>
      <span class="detail-value" id="sentenceCount">0</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Paragraphs</span>
      <span class="detail-value" id="paraCount">0</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Bytes (UTF-8)</span>
      <span class="detail-value" id="byteCount">0</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Avg. Word Length</span>
      <span class="detail-value" id="avgWordLen">0</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Reading Time</span>
      <span class="detail-value" id="readTime">0 min</span>
    </div>
  </div>



  <script>
    "use strict";

    const $input = document.getElementById("input");
    const $charCount = document.getElementById("charCount");
    const $wordCount = document.getElementById("wordCount");
    const $lineCount = document.getElementById("lineCount");
    const $charNoSpace = document.getElementById("charNoSpace");
    const $sentenceCount = document.getElementById("sentenceCount");
    const $paraCount = document.getElementById("paraCount");
    const $byteCount = document.getElementById("byteCount");
    const $avgWordLen = document.getElementById("avgWordLen");
    const $readTime = document.getElementById("readTime");

    function analyze() {
      const text = $input.value;
      
      // Characters
      const chars = text.length;
      $charCount.textContent = chars.toLocaleString();
      
      // Characters without spaces
      const charsNoSpace = text.replace(/\s/g, "").length;
      $charNoSpace.textContent = charsNoSpace.toLocaleString();
      
      // Words
      const words = text.trim() ? text.trim().split(/\s+/).filter(w => w.length > 0) : [];
      const wordCount = words.length;
      $wordCount.textContent = wordCount.toLocaleString();
      
      // Lines
      const lines = text ? text.split("\n").length : 0;
      $lineCount.textContent = lines.toLocaleString();
      
      // Sentences (rough estimate)
      const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0).length;
      $sentenceCount.textContent = sentences.toLocaleString();
      
      // Paragraphs
      const paras = text.split(/\n\s*\n/).filter(p => p.trim().length > 0).length;
      $paraCount.textContent = paras.toLocaleString();
      
      // Bytes
      const bytes = new TextEncoder().encode(text).length;
      $byteCount.textContent = formatBytes(bytes);
      
      // Average word length
      const avgLen = wordCount > 0 
        ? (words.reduce((sum, w) => sum + w.length, 0) / wordCount).toFixed(1)
        : 0;
      $avgWordLen.textContent = avgLen;
      
      // Reading time (200 words per minute)
      const readMinutes = Math.ceil(wordCount / 200);
      $readTime.textContent = readMinutes < 1 ? "< 1 min" : `${readMinutes} min`;
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    }

    $input.addEventListener("input", analyze);
    $input.focus();
  </script>
</body>
</html>
