<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emoji Picker</title>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-hover: #e8e8e8;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --border-color: #e0e0e0;
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --toast-bg: #333333;
      --toast-text: #ffffff;
      --scrollbar-thumb: #c0c0c0;
      --scrollbar-track: transparent;
      --category-active-bg: #e8e5ff;
      --search-bg: #f0f0f0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1e1e1e;
        --bg-secondary: #2a2a2a;
        --bg-hover: #3a3a3a;
        --text-primary: #e0e0e0;
        --text-secondary: #999999;
        --border-color: #3a3a3a;
        --accent-color: #818cf8;
        --accent-hover: #6366f1;
        --toast-bg: #555555;
        --toast-text: #ffffff;
        --scrollbar-thumb: #555555;
        --category-active-bg: #3730a3;
        --search-bg: #2a2a2a;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Search bar */
    .search-container {
      padding: 12px 12px 8px;
      flex-shrink: 0;
    }

    .search-input {
      width: 100%;
      padding: 8px 12px 8px 36px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      background: var(--search-bg);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent-color);
    }

    .search-input::placeholder {
      color: var(--text-secondary);
    }

    .search-wrapper {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.5;
    }

    /* Category tabs */
    .category-tabs {
      display: flex;
      padding: 0 8px 8px;
      gap: 2px;
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .category-tabs::-webkit-scrollbar {
      display: none;
    }

    .category-tab {
      flex-shrink: 0;
      padding: 6px 8px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .category-tab:hover {
      background: var(--bg-hover);
    }

    .category-tab.active {
      background: var(--category-active-bg);
    }

    /* Emoji grid */
    .emoji-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 8px 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
    }

    .emoji-area::-webkit-scrollbar {
      width: 6px;
    }

    .emoji-area::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 3px;
    }

    .emoji-area::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
    }

    .category-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 4px 4px;
      position: sticky;
      top: 0;
      background: var(--bg-primary);
      z-index: 1;
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
      gap: 2px;
    }

    .emoji-btn {
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 26px;
      line-height: 1;
      padding: 6px;
      transition: background 0.12s, transform 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
    }

    .emoji-btn:hover {
      background: var(--bg-hover);
      transform: scale(1.15);
    }

    .emoji-btn:active {
      transform: scale(0.95);
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--toast-bg);
      color: var(--toast-text);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      gap: 8px;
    }

    .empty-state .icon {
      font-size: 40px;
    }

    .empty-state .message {
      font-size: 14px;
    }

    /* Frequently used section */
    .frequent-section {
      padding-bottom: 4px;
    }
  </style>
</head>

    // Frequently used emojis - stored in localStorage
    const STORAGE_KEY = "coco_emoji_frequent";
    const MAX_FREQUENT = 24;

    function getFrequentEmojis() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          return JSON.parse(stored);
        }
      } catch (e) {
        // Ignore storage errors
      }
      return [];
    }

    function addFrequentEmoji(emoji) {
      const frequent = getFrequentEmojis();
      const filtered = frequent.filter(function(e) { return e !== emoji; });
      filtered.unshift(emoji);
      const trimmed = filtered.slice(0, MAX_FREQUENT);
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed));
      } catch (e) {
        // Ignore storage errors
      }
      return trimmed;
    }

    // Category names in order
    const categoryNames = Object.keys(emojiData);

    // Build category tabs
    const categoryTabs = document.getElementById("categoryTabs");
    const emojiArea = document.getElementById("emojiArea");
    const searchInput = document.getElementById("searchInput");
    const toast = document.getElementById("toast");
    let toastTimeout = null;

    function showToast(emoji) {
      toast.textContent = "Copied " + emoji;
      toast.classList.add("show");
      if (toastTimeout) clearTimeout(toastTimeout);
      toastTimeout = setTimeout(function() {
        toast.classList.remove("show");
      }, 1200);
    }

    function copyEmoji(emoji) {
      navigator.clipboard.writeText(emoji).then(function() {
        showToast(emoji);
        const frequent = addFrequentEmoji(emoji);
        emojiData["Frequently Used"].emojis = frequent;
        if (!searchInput.value.trim()) {
          renderEmojis();
        }
      }).catch(function() {
        // Fallback for older browsers
        var textArea = document.createElement("textarea");
        textArea.value = emoji;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand("copy");
          showToast(emoji);
          var frequent = addFrequentEmoji(emoji);
          emojiData["Frequently Used"].emojis = frequent;
          if (!searchInput.value.trim()) {
            renderEmojis();
          }
        } catch (e) {
          // Copy failed silently
        }
        document.body.removeChild(textArea);
      });
    }

    function createEmojiButton(emoji) {
      var btn = document.createElement("button");
      btn.className = "emoji-btn";
      btn.textContent = emoji;
      btn.title = emoji;
      btn.setAttribute("aria-label", "Copy " + emoji);
      btn.addEventListener("click", function() {
        copyEmoji(emoji);
      });
      return btn;
    }

    function renderEmojis(filter) {
      emojiArea.innerHTML = "";
      var hasResults = false;

      categoryNames.forEach(function(categoryName) {
        var category = emojiData[categoryName];
        var emojis = category.emojis;

        if (!emojis || emojis.length === 0) return;

        if (filter) {
          var lowerFilter = filter.toLowerCase();
          emojis = emojis.filter(function(emoji) {
            var keywords = emojiKeywords[emoji] || "";
            return emoji.includes(lowerFilter) || keywords.toLowerCase().includes(lowerFilter);
          });
          if (emojis.length === 0) return;
        }

        hasResults = true;

        var section = document.createElement("div");
        section.id = "category-" + categoryName.replace(/\s+/g, "-");

        var header = document.createElement("div");
        header.className = "category-header";
        header.textContent = categoryName;
        section.appendChild(header);

        var grid = document.createElement("div");
        grid.className = "emoji-grid";

        emojis.forEach(function(emoji) {
          grid.appendChild(createEmojiButton(emoji));
        });

        section.appendChild(grid);
        emojiArea.appendChild(section);
      });

      if (!hasResults) {
        var empty = document.createElement("div");
        empty.className = "empty-state";
        empty.innerHTML = '<span class="icon">🔍</span><span class="message">No emojis found</span>';
        emojiArea.appendChild(empty);
      }
    }

    function renderCategoryTabs() {
      categoryTabs.innerHTML = "";
      categoryNames.forEach(function(categoryName) {
        var category = emojiData[categoryName];
        if (categoryName === "Frequently Used" && (!category.emojis || category.emojis.length === 0)) {
          return;
        }
        var tab = document.createElement("button");
        tab.className = "category-tab";
        tab.textContent = category.icon;
        tab.title = categoryName;
        tab.setAttribute("aria-label", categoryName);
        tab.addEventListener("click", function() {
          searchInput.value = "";
          renderEmojis();
          var target = document.getElementById("category-" + categoryName.replace(/\s+/g, "-"));
          if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "start" });
          }
          // Update active state
          document.querySelectorAll(".category-tab").forEach(function(t) {
            t.classList.remove("active");
          });
          tab.classList.add("active");
        });
        categoryTabs.appendChild(tab);
      });
    }

    // Highlight active category on scroll
    function updateActiveCategory() {
      var sections = categoryNames.map(function(name) {
        return document.getElementById("category-" + name.replace(/\s+/g, "-"));
      }).filter(Boolean);

      var scrollTop = emojiArea.scrollTop;
      var currentSection = null;

      sections.forEach(function(section) {
        if (section.offsetTop - emojiArea.offsetTop <= scrollTop + 10) {
          currentSection = section;
        }
      });

      if (currentSection) {
        var currentId = currentSection.id;
        document.querySelectorAll(".category-tab").forEach(function(tab) {
          var categoryName = tab.title;
          var expectedId = "category-" + categoryName.replace(/\s+/g, "-");
          if (expectedId === currentId) {
            tab.classList.add("active");
          } else {
            tab.classList.remove("active");
          }
        });
      }
    }

    // Debounce helper
    function debounce(fn, delay) {
      var timer;
      return function() {
        var args = arguments;
        var context = this;
        clearTimeout(timer);
        timer = setTimeout(function() {
          fn.apply(context, args);
        }, delay);
      };
    }

    // Search handling
    searchInput.addEventListener("input", debounce(function() {
      var query = searchInput.value.trim();
      renderEmojis(query || null);
    }, 150));

    // Scroll-based active category highlighting
    emojiArea.addEventListener("scroll", debounce(updateActiveCategory, 50));

    // Initialize
    emojiData["Frequently Used"].emojis = getFrequentEmojis();
    renderCategoryTabs();
    renderEmojis();

    // Set first visible tab as active
    var firstTab = categoryTabs.querySelector(".category-tab");
    if (firstTab) {
      firstTab.classList.add("active");
    }
  </script>
</body>
</html>
