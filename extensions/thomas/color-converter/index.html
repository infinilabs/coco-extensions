<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Converter</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --toast-bg: #333; --toast-text: #fff;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a; --toast-bg: #555; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 16px; gap: 14px;
    }
    .input-row { display: flex; gap: 8px; align-items: center; }
    input[type="text"] {
      flex: 1; font: inherit; color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px;
    }
    input[type="text"]:focus {
      outline: 2px solid var(--accent); outline-offset: -1px;
    }
    .color-preview {
      width: 44px; height: 44px;
      border: 1px solid var(--border); border-radius: 8px;
      background: #808080;
      flex-shrink: 0;
    }
    .results {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 0;
    }
    .item {
      display: grid; grid-template-columns: 70px 1fr auto;
      gap: 10px; align-items: center;
      padding: 10px 4px; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .item:hover { background: var(--bg-elev); }
    .item .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
    .item .value {
      font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      word-break: break-all; color: var(--text);
    }
    .item .copy-hint { color: var(--muted); font-size: 11px; opacity: 0; }
    .item:hover .copy-hint { opacity: 1; }
    .toast {
      position: fixed; bottom: 16px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--toast-bg); color: var(--toast-text);
      padding: 8px 14px; border-radius: 6px; font-size: 13px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .error { color: #e53e3e; font-size: 13px; padding: 10px 4px; }
    footer { color: var(--muted); font-size: 11px; text-align: center; margin-top: auto; }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <div class="input-row">
    <input type="text" id="input" placeholder="Enter color (e.g., #FF6363, rgb(255, 99, 99), hsl(0, 100%, 69%))" />
    <div class="color-preview" id="preview"></div>
  </div>

  <div class="results" id="results"></div>

  <footer>
    Ported from the Raycast <a href="https://github.com/raycast/extensions/tree/main/extensions/color-picker" target="_blank" rel="noopener">Color Picker</a> extension by thomas · MIT
  </footer>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    "use strict";

    const $input = document.getElementById("input");
    const $preview = document.getElementById("preview");
    const $results = document.getElementById("results");
    const $toast = document.getElementById("toast");

    function showToast(msg) {
      $toast.textContent = msg;
      $toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => $toast.classList.remove("show"), 1200);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("Copied to clipboard");
      } catch (e) {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        showToast("Copied to clipboard");
      }
    }

    // Color parsing
    function parseHex(str) {
      const match = str.match(/^#?([0-9a-f]{3,8})$/i);
      if (!match) return null;
      let hex = match[1];
      if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
      if (hex.length === 4) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3];
      if (hex.length !== 6 && hex.length !== 8) return null;
      const r = parseInt(hex.slice(0,2), 16);
      const g = parseInt(hex.slice(2,4), 16);
      const b = parseInt(hex.slice(4,6), 16);
      const a = hex.length === 8 ? parseInt(hex.slice(6,8), 16) / 255 : 1;
      return { r, g, b, a };
    }

    function parseRgb(str) {
      const match = str.match(/^rgba?\s*\(\s*(\d+)\s*[,\s]\s*(\d+)\s*[,\s]\s*(\d+)\s*(?:[,\/]\s*([\d.]+%?))?\s*\)$/i);
      if (!match) return null;
      const r = Math.min(255, parseInt(match[1], 10));
      const g = Math.min(255, parseInt(match[2], 10));
      const b = Math.min(255, parseInt(match[3], 10));
      let a = 1;
      if (match[4] !== undefined) {
        a = match[4].endsWith('%') ? parseFloat(match[4]) / 100 : parseFloat(match[4]);
      }
      return { r, g, b, a };
    }

    function parseHsl(str) {
      const match = str.match(/^hsla?\s*\(\s*([\d.]+)\s*[,\s]\s*([\d.]+)%?\s*[,\s]\s*([\d.]+)%?\s*(?:[,\/]\s*([\d.]+%?))?\s*\)$/i);
      if (!match) return null;
      const h = parseFloat(match[1]) % 360;
      const s = Math.min(100, parseFloat(match[2])) / 100;
      const l = Math.min(100, parseFloat(match[3])) / 100;
      let a = 1;
      if (match[4] !== undefined) {
        a = match[4].endsWith('%') ? parseFloat(match[4]) / 100 : parseFloat(match[4]);
      }
      // Convert HSL to RGB
      const c = (1 - Math.abs(2 * l - 1)) * s;
      const x = c * (1 - Math.abs((h / 60) % 2 - 1));
      const m = l - c / 2;
      let r = 0, g = 0, b = 0;
      if (h < 60) { r = c; g = x; }
      else if (h < 120) { r = x; g = c; }
      else if (h < 180) { g = c; b = x; }
      else if (h < 240) { g = x; b = c; }
      else if (h < 300) { r = x; b = c; }
      else { r = c; b = x; }
      return {
        r: Math.round((r + m) * 255),
        g: Math.round((g + m) * 255),
        b: Math.round((b + m) * 255),
        a
      };
    }

    function parseColor(str) {
      const trimmed = str.trim();
      return parseHex(trimmed) || parseRgb(trimmed) || parseHsl(trimmed);
    }

    // Color conversions
    function rgbToHex(r, g, b, a) {
      const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
      if (a < 1) {
        return hex + Math.round(a * 255).toString(16).padStart(2, '0');
      }
      return hex;
    }

    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h = 0, s = 0;
      const l = (max + min) / 2;
      if (max !== min) {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
    }

    function rgbToHsv(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h = 0;
      const v = max;
      const d = max - min;
      const s = max === 0 ? 0 : d / max;
      if (max !== min) {
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return { h: Math.round(h * 360), s: Math.round(s * 100), v: Math.round(v * 100) };
    }

    function renderResults(color) {
      const { r, g, b, a } = color;
      const hex = rgbToHex(r, g, b, a);
      const hsl = rgbToHsl(r, g, b);
      const hsv = rgbToHsv(r, g, b);
      
      const formats = [
        { label: 'HEX', value: hex.toUpperCase() },
        { label: 'HEX (lower)', value: hex.toLowerCase() },
        { label: 'RGB', value: a < 1 ? `rgba(${r}, ${g}, ${b}, ${a.toFixed(2)})` : `rgb(${r}, ${g}, ${b})` },
        { label: 'RGB %', value: `rgb(${Math.round(r/255*100)}%, ${Math.round(g/255*100)}%, ${Math.round(b/255*100)}%)` },
        { label: 'HSL', value: a < 1 ? `hsla(${hsl.h}, ${hsl.s}%, ${hsl.l}%, ${a.toFixed(2)})` : `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)` },
        { label: 'HSV', value: `hsv(${hsv.h}, ${hsv.s}%, ${hsv.v}%)` },
        { label: 'CSS RGB', value: `rgb(${r} ${g} ${b}${a < 1 ? ' / ' + Math.round(a*100) + '%' : ''})` },
      ];

      $results.innerHTML = formats.map(f => `
        <div class="item" data-value="${f.value.replace(/"/g, '&quot;')}">
          <span class="label">${f.label}</span>
          <span class="value">${f.value}</span>
          <span class="copy-hint">Click to copy</span>
        </div>
      `).join('');

      // Add click handlers
      $results.querySelectorAll('.item').forEach(item => {
        item.addEventListener('click', () => copyText(item.dataset.value));
      });
    }

    function update() {
      const color = parseColor($input.value);
      if (!color) {
        $results.innerHTML = $input.value.trim() ? '<div class="error">Could not parse color. Try #FF6363, rgb(255, 99, 99), or hsl(0, 100%, 69%)</div>' : '';
        $preview.style.background = '#808080';
        return;
      }

      const { r, g, b, a } = color;
      $preview.style.background = `rgba(${r}, ${g}, ${b}, ${a})`;
      renderResults(color);
    }

    $input.addEventListener('input', update);

    // Initialize with a nice default color
    $input.value = '#6366F1';
    update();
  </script>
</body>
</html>
