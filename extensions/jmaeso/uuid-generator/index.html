<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UUID Generator</title>
  <style>
    :root {
      --bg: #ffffff; --bg-elev: #f5f5f5; --text: #1a1a1a; --muted: #666;
      --border: #e0e0e0; --accent: #6366f1; --accent-text: #fff;
      --toast-bg: #333; --toast-text: #fff;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1e1e1e; --bg-elev: #2a2a2a; --text: #e0e0e0; --muted: #999;
              --border: #3a3a3a; --accent: #818cf8; --accent-text: #1a1a1a; --toast-bg: #555; }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; padding: 16px; gap: 12px;
    }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .controls label { color: var(--muted); font-size: 13px; }
    select, input[type="number"], button {
      font: inherit; color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
    }
    input[type="number"] { width: 80px; }
    .checkbox { display: inline-flex; gap: 6px; align-items: center; user-select: none; }
    button { cursor: pointer; }
    button.primary {
      background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600;
    }
    button:hover { filter: brightness(1.1); }
    textarea {
      flex: 1; width: 100%; min-height: 240px; resize: none;
      font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      line-height: 1.55; color: var(--text); background: var(--bg-elev);
      border: 1px solid var(--border); border-radius: 8px; padding: 12px;
    }
    .toast {
      position: fixed; bottom: 16px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--toast-bg); color: var(--toast-text);
      padding: 8px 14px; border-radius: 6px; font-size: 13px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    footer { color: var(--muted); font-size: 11px; text-align: center; }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <div class="controls">
    <label for="kind">Version</label>
    <select id="kind">
      <option value="v4">UUID v4 (random)</option>
      <option value="v7">UUID v7 (time-ordered)</option>
    </select>
    <label for="count">Count</label>
    <input type="number" id="count" value="1" min="1" max="500" />
    <label class="checkbox"><input type="checkbox" id="upper" /> Uppercase</label>
    <button id="regen">Regenerate</button>
    <button class="primary" id="copy">Copy</button>
  </div>
  <textarea id="output" readonly aria-label="Generated UUIDs"></textarea>
  <footer>
    Ported from the Raycast <a href="https://github.com/raycast/extensions/tree/004a0b6b7c846ef7d350217d2c91bc5d34fb265d/extensions/uuid-generator" target="_blank" rel="noopener">UUID Generator</a> extension by jmaeso · MIT
  </footer>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    "use strict";

    function randomBytes(n) {
      const buf = new Uint8Array(n);
      window.crypto.getRandomValues(buf);
      return buf;
    }

    function bytesToUuid(bytes) {
      // RFC 4122 textual representation: 8-4-4-4-12 hex.
      const h = Array.from(bytes, b => b.toString(16).padStart(2, "0"));
      return `${h.slice(0, 4).join("")}-${h.slice(4, 6).join("")}-${h.slice(6, 8).join("")}-${h.slice(8, 10).join("")}-${h.slice(10, 16).join("")}`;
    }

    function uuidV4() {
      // Prefer the platform implementation when present.
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      const b = randomBytes(16);
      b[6] = (b[6] & 0x0f) | 0x40; // version 4
      b[8] = (b[8] & 0x3f) | 0x80; // variant 1 (RFC 4122)
      return bytesToUuid(b);
    }

    function uuidV7() {
      // RFC 9562 §5.7: 48-bit Unix-millis timestamp + version + variant + 74 random bits.
      const ts = Date.now();
      const b = randomBytes(16);
      // Big-endian 48-bit timestamp into bytes 0..5.
      b[0] = (ts / 2 ** 40) & 0xff;
      b[1] = (ts / 2 ** 32) & 0xff;
      b[2] = (ts >>> 24) & 0xff;
      b[3] = (ts >>> 16) & 0xff;
      b[4] = (ts >>> 8) & 0xff;
      b[5] = ts & 0xff;
      b[6] = (b[6] & 0x0f) | 0x70; // version 7
      b[8] = (b[8] & 0x3f) | 0x80; // variant 1 (RFC 4122)
      return bytesToUuid(b);
    }

    function generate(kind, count, upper) {
      const out = [];
      const fn = kind === "v7" ? uuidV7 : uuidV4;
      const n = Math.max(1, Math.min(500, count | 0));
      for (let i = 0; i < n; i++) {
        const u = fn();
        out.push(upper ? u.toUpperCase() : u);
      }
      return out.join("\n");
    }

    const $kind  = document.getElementById("kind");
    const $count = document.getElementById("count");
    const $up    = document.getElementById("upper");
    const $out   = document.getElementById("output");
    const $toast = document.getElementById("toast");

    function showToast(msg) {
      $toast.textContent = msg;
      $toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => $toast.classList.remove("show"), 1200);
    }

    function regenerate() {
      $out.value = generate($kind.value, parseInt($count.value, 10) || 1, $up.checked);
    }

    async function copyOutput() {
      try { await navigator.clipboard.writeText($out.value); }
      catch (_) { $out.select(); document.execCommand("copy"); }
      showToast("Copied to clipboard");
    }

    document.getElementById("regen").addEventListener("click", regenerate);
    document.getElementById("copy").addEventListener("click", copyOutput);
    $kind.addEventListener("change", regenerate);
    $count.addEventListener("change", regenerate);
    $up.addEventListener("change", regenerate);

    regenerate();
  </script>
</body>
</html>
